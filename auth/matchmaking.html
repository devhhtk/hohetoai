<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Opponents — HoHeTo Kyle</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/matchmaking.css">
</head>

<body class="dashboard-body">

    <!-- ══ Sidebar Placeholder ══ -->
    <div id="comp-sidebar"></div>

    <!-- ══ Main Content Area ══ -->
    <main class="main-area">
        <div id="comp-header"></div>

        <div class="content-view">
            <div class="match-page">
                
                <header class="match-header">
                    <h1 class="match-title">Resonance Matchmaking</h1>
                    <div class="match-status">SCANNING FOR ACTIVE SQUADS</div>
                </header>

                <div id="opponent-grid" class="opponent-grid">
                    <!-- Loaded dynamically -->
                    <div class="streak-loading"></div>
                </div>

            </div>
            <div id="comp-footer"></div>
        </div>
    </main>

    <!-- ══ Loading Overlay for Battle Entry ══ -->
    <div id="battle-loading" class="loading-overlay">
        <div class="radar"></div>
        <div class="loading-text">Synchronizing Resonance...</div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await ComponentLoader.loadAll([
                { id: 'comp-sidebar', path: '../components/sidebar.html' },
                { id: 'comp-header', path: '../components/header.html' },
                { id: 'comp-footer', path: '../components/footer.html' }
            ]);

            if (window.AumageDB) {
                window.AumageDB.init();
                await window.AumageDB.requireAuth();
            }

            const grid = document.getElementById('opponent-grid');
            const statusText = document.querySelector('.match-status');
            const loadingOverlay = document.getElementById('battle-loading');

            // --- Automated Matchmaking Flow ---
            async function startMatchmaking() {
                try {
                    statusText.textContent = "INITIALIZING RESONANCE SYNC...";
                    
                    const result = await window.AumageDB.startBattleMatch();
                    const { battle, role } = result;

                    if (role === 'player_b') {
                        // We joined an existing battle! Redirect immediately.
                        statusText.textContent = "OPPONENT FOUND! REDIRECTING...";
                        loadingOverlay.classList.add('loading-overlay--active');
                        setTimeout(() => {
                            window.location.href = `battle.html?id=${battle.id}`;
                        }, 1500);
                    } else {
                        // We created a battle. Wait for player B.
                        statusText.textContent = "WAITING FOR CHALLENGER (60s)...";
                        pollBattleStatus(battle.id);
                    }
                } catch (e) {
                    statusText.textContent = "ERROR: " + e.message.toUpperCase();
                    if (e.message.includes('team')) {
                        setTimeout(() => window.location.href = 'team.html', 2000);
                    } else {
                        loadManualOpponents(); // Fallback to list
                    }
                }
            }

            let pollInterval;
            let pollStart = Date.now();

            async function pollBattleStatus(battleId) {
                pollInterval = setInterval(async () => {
                    const elapsed = Math.floor((Date.now() - pollStart) / 1000);
                    const remaining = 60 - elapsed;

                    if (remaining <= 0) {
                        clearInterval(pollInterval);
                        statusText.textContent = "MATCHMAKING TIMED OUT.";
                        loadManualOpponents();
                        return;
                    }

                    statusText.textContent = `WAITING FOR CHALLENGER (${remaining}s)...`;

                    const battle = await window.AumageDB.getBattleStatus(battleId);
                    if (battle && battle.status === 'ongoing') {
                        clearInterval(pollInterval);
                        statusText.textContent = "CHALLENGER JOINED! STARTING...";
                        loadingOverlay.classList.add('loading-overlay--active');
                        setTimeout(() => {
                            window.location.href = `battle.html?id=${battleId}`;
                        }, 2000);
                    }
                }, 2000);
            }

            // --- Fallback: Manual Opponents ---
            async function loadManualOpponents() {
                statusText.textContent = "DISPLAYING RECENTLY ACTIVE WALKERS";
                const opponents = await window.AumageDB.findOpponents();
                
                if (!opponents || opponents.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-opponents">
                            <p>No other active squads found at the moment.</p>
                            <a href="dashboard.html" class="btn-primary" style="text-decoration:none;">Return to Dashboard</a>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = '';
                for (const opp of opponents) {
                    const profile = opp.profiles || {};
                    const card = document.createElement('div');
                    card.className = 'opponent-card';
                    
                    const creatureDetails = await Promise.all(
                        (opp.creature_ids || []).slice(0, 3).map(id => 
                            window.AumageDB.supabase.from('creatures').select('card_image_url, image_url').eq('id', id).single().then(r => r.data)
                        )
                    );

                    card.innerHTML = `
                        <div class="opponent-user">
                            <img src="${profile.avatar_url || 'https://ui-avatars.com/api/?name=' + (profile.display_name || 'User')}" class="opponent-avatar">
                            <div class="opponent-info">
                                <h3>${profile.display_name || 'Aether Walker'}</h3>
                                <span class="opponent-level">Available for Battle</span>
                            </div>
                        </div>
                        <div class="opponent-squad-preview">
                            ${creatureDetails.map(c => `
                                <div class="squad-slot-mini">
                                    <img src="${c?.card_image_url || c?.image_url || '../img/placeholder.png'}">
                                </div>
                            `).join('')}
                            ${Array(3 - creatureDetails.length).fill('<div class="squad-slot-mini"></div>').join('')}
                        </div>
                        <button class="btn-battle" onclick="challengeDirect('${opp.user_id}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                            </svg>
                            Direct Challenge
                        </button>
                    `;
                    grid.appendChild(card);
                }
            }

            window.challengeDirect = function(opponentId) {
                loadingOverlay.classList.add('loading-overlay--active');
                setTimeout(() => {
                    window.location.href = `battle.html?opponent=${opponentId}`;
                }, 2000);
            };

            startMatchmaking();
        });
    </script>
</body>

</html>
