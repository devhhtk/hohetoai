    <!-- ══ Comments Modal ══ -->
    <div class="modal-overlay" id="commentsModal">
        <div class="comments-modal">
            <div class="modal-header">
                <h3 class="modal-title">Comments</h3>
                <button class="modal-close" id="closeComments">&times;</button>
            </div>
            <div class="comments-list" id="commentsList">
                <!-- Comments will be loaded here -->
                <div class="loading-state">Echoes正在回响...</div>
            </div>
            <form class="comment-form" id="commentForm">
                <textarea class="comment-input" placeholder="Write a comment..." rows="3" id="commentContent"></textarea>
                <button type="submit" class="btn-post-comment">Post Comment</button>
            </form>
        </div>
    </div>

    <!-- Supabase & DB Layer -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Load Components
            await ComponentLoader.loadAll([
                { id: 'comp-sidebar', path: '../components/sidebar.html' },
                { id: 'comp-header', path: '../components/header.html' },
                { id: 'comp-footer', path: '../components/footer.html' }
            ]);

            // Change top bar title to "Discover"
            const topTitle = document.querySelector('.top-bar__title');
            if (topTitle) topTitle.textContent = 'Discover';

            // Set active nav item in sidebar
            const navExplore = document.getElementById('nav-explore');
            if (navExplore) navExplore.classList.add('nav-item--active');

            // Database Init
            if (window.AumageDB) {
                window.AumageDB.init();
                // Load Dynamic Explore Cards (Default: All/Latest)
                loadExploreCards('all');

                // Attachment to Filter Buttons
                const filterBtns = document.querySelectorAll('.filter-btn');
                filterBtns.forEach(btn => {
                    btn.onclick = () => {
                        // Change Active State
                        filterBtns.forEach(b => b.classList.remove('filter-btn--active'));
                        btn.classList.add('filter-btn--active');

                        // Map text to sort type
                        const sortType = btn.textContent.trim().toLowerCase().replace(' ', '_');
                        loadExploreCards(sortType);
                    };
                });
            }

            async function loadExploreCards(sort = 'all') {
                const grid = document.getElementById('explore-grid');
                if (!grid) return;

                // Show loading state if needed
                grid.innerHTML = '<div class="loading-state">Syncing with the Realm...</div>';

                const creatures = await window.AumageDB.getExploreCards(24, sort);
                grid.innerHTML = ''; // Clear loading

                if (!creatures || creatures.length === 0) {
                    grid.innerHTML = '<div class="no-results">No creatures discovered yet. Be the first!</div>';
                    return;
                }

                creatures.forEach(creature => {
                    const card = createCreatureCard(creature);
                    grid.appendChild(card);
                });
            }

            function createCreatureCard(creature) {
                const div = document.createElement('div');
                div.className = 'creature-card';

                // Use card_image_url as requested by user
                const imgUrl = creature.card_image_url || '../img/placeholder-card.png';
                const name = creature.creature_name || 'Legendary Echo';

                // Author logic: use joined profile display_name
                const authorName = creature.profiles?.display_name || (creature.user_id ? 'Explorer' : 'Anonymous');
                const author = `by ${authorName}`;

                const type = (creature.audio_source === 'upload' ? 'Imagen Born' : 'Resogen Born');

                const isLiked = creature.user_has_liked === true;
                const likedStyle = isLiked ? 'style="color: var(--color-primary)"' : '';

                div.innerHTML = `
                    <div class="creature-card__img-wrapper">
                        <img src="${imgUrl}" class="creature-card__img" alt="${name}" loading="lazy">
                    </div>
                    <div class="creature-card__content">
                        <div class="creature-card__header">
                            <h3 class="creature-card__name">${name}</h3>
                            <span class="creature-card__author">${author}</span>
                        </div>
                        <div class="creature-card__type-pill">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 18V5l12-2v13"></path>
                                <circle cx="6" cy="18" r="3"></circle>
                                <circle cx="18" cy="16" r="3"></circle>
                            </svg>
                            ${type}
                        </div>
                        <div class="creature-card__footer">
                            <div class="action-item" title="Like" ${likedStyle}>
                                <svg viewBox="0 0 24 24" fill="${isLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
                                    <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path>
                                </svg>
                                <span>${creature.likes_count || 0}</span>
                            </div>
                            <div class="action-item" title="Comment">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                                </svg>
                                <span>${creature.comments_count || 0}</span>
                            </div>
                            <div class="action-item" title="Connect">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                                </svg>
                                Connect
                            </div>
                        </div>
                    </div>
                `;

                // Add click listener to whole card for details (excluding actions)
                div.onclick = (e) => {
                    if (e.target.closest('.action-item')) return;
                    window.location.href = `creature-details.html?id=${creature.id}`;
                };

                // Add like listener
                const likeBtn = div.querySelector('[title="Like"]');
                likeBtn.onclick = async (e) => {
                    e.stopPropagation();
                    const result = await window.AumageDB.toggleLike(creature.id);
                    if (result) {
                        const countSpan = likeBtn.querySelector('span');
                        let current = parseInt(countSpan.textContent);
                        countSpan.textContent = result.liked ? current + 1 : current - 1;
                        likeBtn.style.color = result.liked ? 'var(--color-primary)' : '';
                        
                        const svg = likeBtn.querySelector('svg');
                        if (svg) svg.setAttribute('fill', result.liked ? 'currentColor' : 'none');
                    }
                };

                // Add comment listener
                const commentBtn = div.querySelector('[title="Comment"]');
                commentBtn.onclick = (e) => {
                    e.stopPropagation();
                    openCommentsModal(creature.id, name);
                };

                return div;
            }

            // Comments Modal Logic
            const modal = document.getElementById('commentsModal');
            const closeBtn = document.getElementById('closeComments');
            const commentList = document.getElementById('commentsList');
            const commentForm = document.getElementById('commentForm');
            let currentCreatureId = null;

            async function openCommentsModal(creatureId, name) {
                currentCreatureId = creatureId;
                modal.querySelector('.modal-title').textContent = `Comments — ${name}`;
                modal.classList.add('modal-overlay--active');
                
                // Fetch comments
                commentList.innerHTML = '<div class="loading-state">Summoning spirits...</div>';
                const comments = await window.AumageDB.getComments(creatureId);
                
                commentList.innerHTML = '';
                if (!comments || comments.length === 0) {
                    commentList.innerHTML = '<div class="no-comments">No echoes yet. Be the first to speak.</div>';
                } else {
                    comments.forEach(comment => {
                        const item = document.createElement('div');
                        item.className = 'comment-item';
                        
                        const author = comment.profiles?.display_name || 'Anonymous';
                        const avatar = comment.profiles?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(author)}&background=random`;
                        const date = new Date(comment.created_at).toLocaleDateString();
                        
                        item.innerHTML = `
                            <div class="comment-avatar">
                                <img src="${avatar}" alt="${author}">
                            </div>
                            <div class="comment-body">
                                <div class="comment-author">${author}</div>
                                <div class="comment-text">${comment.content}</div>
                                <div class="comment-date">${date}</div>
                            </div>
                        `;
                        commentList.appendChild(item);
                    });
                }
            }

            closeBtn.onclick = () => {
                modal.classList.remove('modal-overlay--active');
            };

            modal.onclick = (e) => {
                if (e.target === modal) modal.classList.remove('modal-overlay--active');
            };

            commentForm.onsubmit = async (e) => {
                e.preventDefault();
                const content = document.getElementById('commentContent').value.trim();
                if (!content || !currentCreatureId) return;

                const btn = commentForm.querySelector('button');
                btn.disabled = true;
                btn.textContent = 'Posting...';

                const result = await window.AumageDB.postComment(currentCreatureId, content);
                btn.disabled = false;
                btn.textContent = 'Post Comment';

                if (result) {
                    document.getElementById('commentContent').value = '';
                    // Reload comments
                    openCommentsModal(currentCreatureId, modal.querySelector('.modal-title').textContent.split(' — ')[1]);
                }
            };

            // Profile Toggle logic
            const profileToggle = document.getElementById('profileToggle');
            const profileDropup = document.getElementById('profileDropup');

            if (profileToggle && profileDropup) {
                profileToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    profileDropup.classList.toggle('profile-dropup--active');
                });

                document.addEventListener('click', () => {
                    profileDropup.classList.remove('profile-dropup--active');
                });
            }
        });
    </script>
