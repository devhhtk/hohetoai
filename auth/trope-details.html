<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trope Details — HoHeTo Kai</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/trope_details.css">
</head>

<body class="dashboard-body">

    <!-- ══ Sidebar Placeholder ══ -->
    <div id="comp-sidebar"></div>

    <!-- ══ Main Content Area ══ -->
    <main class="main-area">

        <!-- Top Navigation Bar Placeholder -->
        <div id="comp-header"></div>

        <!-- Dynamic Content View -->
        <div class="content-view">

            <div class="trope-details-container">

                <!-- Trope Banner -->
                <div class="trope-banner" id="tropeBanner" data-trope="unknown">
                    <a href="collection.html" class="trope-banner__back">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </a>
                    <div class="trope-banner__logo">
                        <img id="tropeLogo" src="../img/placeholder2.png" alt="Trope Logo">
                    </div>
                    <div class="trope-banner__info">
                        <h1 class="trope-banner__name" id="tropeName">Loading Trope...</h1>
                        <div class="trope-banner__count" id="tropeCount">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                            </svg>
                            <span>0 Creations</span>
                        </div>
                    </div>
                </div>

                <!-- Header & Filters -->
                <div class="trope-content-header">
                    <h2 class="trope-content-title" id="pageTitle">Collections of Trope</h2>
                    <div class="trope-filters">
                        <div class="search-container">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input type="text" id="searchInput" placeholder="Search creatures...">
                        </div>
                        <select class="filter-select" id="viewFilter">
                            <option value="all">All View</option>
                            <option value="cards">Cards Only</option>
                            <option value="characters">Characters Only</option>
                        </select>
                        <select class="filter-select" id="sortFilter">
                            <option value="newest">Sort: Newest First</option>
                            <option value="oldest">Sort: Oldest First</option>
                            <option value="rarity">Sort: By Rarity</option>
                        </select>
                    </div>
                </div>

                <!-- Grid Sections -->
                <div class="grid-section" id="cardsSection">
                    <h3 class="grid-section__title">Cards</h3>
                    <div class="cards-grid" id="cardsGrid">
                        <!-- Populated via JS -->
                    </div>
                </div>

                <div class="grid-section" id="charactersSection">
                    <h3 class="grid-section__title">Characters</h3>
                    <div class="characters-grid" id="charactersGrid">
                        <!-- Populated via JS -->
                    </div>
                </div>

            </div>

            <!-- Footer Placeholder -->
            <div id="comp-footer"></div>

        </div>
    </main>


    <!-- ══ Trade Modal ══ -->
    <div class="trade-modal-overlay" id="tradeModalOverlay">
        <div class="trade-modal">
            <div class="trade-modal__header">
                <h3 class="trade-modal__title">List for Trade</h3>
                <p class="trade-modal__subtitle" id="tradeCreatureName">Unnamed Creature</p>
                <div id="tradeRarityTag" class="rarity-tag abundant">Abundant</div>
            </div>

            <div class="trade-card-preview">
                <img id="tradeCardImg" src="../img/placeholder2.png" alt="Card Preview">
            </div>

            <div class="trade-price-section">
                <div class="trade-price-display">
                    <span class="trade-price-value" id="priceDisplay">0</span>
                    <span class="trade-price-currency">TOKENS</span>
                </div>

                <div class="price-slider-container">
                    <input type="range" class="price-slider" id="priceSlider" min="0" max="1000" value="0">
                    <div class="price-range-labels">
                        <span id="minPriceLabel">0</span>
                        <span id="maxPriceLabel">1000</span>
                    </div>
                </div>
            </div>

            <div class="trade-actions">
                <button class="btn-trade-cancel" id="closeTradeModal">Cancel</button>
                <button class="btn-trade-submit" id="submitTrade">Confirm Listing</button>
            </div>
        </div>
    </div>

    <!-- Supabase & DB Layer -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Load Components
            await ComponentLoader.loadAll([
                { id: 'comp-sidebar', path: '../components/sidebar.html' },
                { id: 'comp-header', path: '../components/header.html' },
                { id: 'comp-footer', path: '../components/footer.html' }
            ]);

            // 2. Auth & DB Init
            if (window.AumageDB) {
                window.AumageDB.init();
                await window.AumageDB.requireAuth();
            }

            // 3. Parse Trope from URL
            const urlParams = new URLSearchParams(window.location.search);
            const tropeKey = (urlParams.get('trope') || 'terratrope').toLowerCase();

            // 4. Update UI for specific trope
            const tropeMap = {
                terratrope: { name: 'Terratrope', logo: 'Terratrope.png' },
                aquatrope: { name: 'Aquatrope', logo: 'Aquatrope.png' },
                aerotrope: { name: 'Aerotrope', logo: 'Aerotrope.png' },
                pyrotrope: { name: 'Pyrotrope', logo: 'Pyrotrope.png' },
                sonatrope: { name: 'Sonatrope', logo: 'Sonatrope.png' },
                floratrope: { name: 'Floratrope', logo: 'Floratrope.png' },
                prismatrope: { name: 'Prismatrope', logo: 'Prismatrope.png' },
                megatrope: { name: 'Megatrope', logo: 'Megatrope.png' }
            };

            const trope = tropeMap[tropeKey] || tropeMap.terratrope;
            const bannerEl = document.getElementById('tropeBanner');
            if (bannerEl) bannerEl.setAttribute('data-trope', tropeKey);

            const logoEl = document.getElementById('tropeLogo');
            if (logoEl) logoEl.src = `../img/tropes-icons/${trope.logo}`;

            const nameEl = document.getElementById('tropeName');
            if (nameEl) nameEl.textContent = trope.name;

            const pageTitleEl = document.getElementById('pageTitle');
            if (pageTitleEl) pageTitleEl.textContent = `Collections of ${trope.name}`;

            document.title = `${trope.name} Collection — HoHeTo Kai`;

            // 5. Fetch & Render
            let allCreatures = [];
            let currentTradeId = null;

            const rarityRanges = {
                abundant: { min: 10, max: 200, default: 50 },
                common: { min: 10, max: 200, default: 50 },
                endemic: { min: 200, max: 1000, default: 400 },
                uncommon: { min: 200, max: 1000, default: 400 },
                holotype: { min: 1000, max: 5000, default: 2500 },
                rare: { min: 1000, max: 5000, default: 2500 },
                mythic: { min: 5000, max: 25000, default: 10000 },
                legendary: { min: 10000, max: 100000, default: 50000 }
            };

            const initializeFetch = async () => {
                // Ensure auth context is ready
                if (!window.AumageDB || !window.AumageDB.user) {
                    setTimeout(initializeFetch, 500);
                    return;
                }

                allCreatures = await window.AumageDB.getCreaturesByTrope(tropeKey);

                const countContainer = document.querySelector('#tropeCount span');
                if (countContainer) {
                    countContainer.textContent = `${allCreatures.length} Creation${allCreatures.length === 1 ? '' : 's'}`;
                }

                renderGrids(allCreatures);
            };

            const renderGrids = (creatures) => {
                const cardsGrid = document.getElementById('cardsGrid');
                const charsGrid = document.getElementById('charactersGrid');

                cardsGrid.innerHTML = '';
                charsGrid.innerHTML = '';

                if (creatures.length === 0) {
                    const emptyHtml = `<div class="empty-msg">No creatures found in the <b>${tropeKey}</b> category yet.</div>`;
                    cardsGrid.innerHTML = emptyHtml;
                    charsGrid.innerHTML = emptyHtml;
                    return;
                }

                // --- 1. Filter for Cards (Those with generated schematics via the new card_image_url field) ---
                const specializedCards = creatures.filter(c => c.card_image_url && c.card_image_url.trim() !== '');
                if (specializedCards.length > 0) {
                    specializedCards.forEach(c => {
                        const cardItem = document.createElement('div');
                        cardItem.className = 'creature-card-item';
                        cardItem.innerHTML = `
                            <img src="${c.card_image_url}" alt="${c.creature_name || 'Card'}">
                            <button class="share-card-btn" title="Copy Share Link">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="18" cy="5" r="3"></circle>
                                    <circle cx="6" cy="12" r="3"></circle>
                                    <circle cx="18" cy="19" r="3"></circle>
                                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                                </svg>
                            </button>
                            <button class="trade-card-btn" title="Pay to Trade">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="16 3 21 3 21 8"></polyline>
                                    <line x1="4" y1="20" x2="21" y2="3"></line>
                                    <polyline points="21 16 21 21 16 21"></polyline>
                                    <line x1="15" y1="15" x2="21" y2="21"></line>
                                    <line x1="4" y1="4" x2="9" y2="9"></line>
                                </svg>
                            </button>
                            <div class="creature-card-item__info">
                                <b>${c.creature_name || 'Unnamed Creature'}</b><br>
                                ${c.serial_number || 'No Serial'}
                                ${c.is_tradeable ? `<br><span style="color:#08d2c1">Listed: ${c.price} Tokens</span>` : ''}
                            </div>
                        `;

                        // Copy functionality
                        const shareBtn = cardItem.querySelector('.share-card-btn');
                        shareBtn.onclick = (e) => {
                            e.stopPropagation();
                            copyShareLink(c, shareBtn);
                        };

                        // Trade functionality
                        const tradeBtn = cardItem.querySelector('.trade-card-btn');
                        tradeBtn.onclick = (e) => {
                            e.stopPropagation();
                            openTradeModal(c);
                        };

                        cardItem.onclick = () => window.location.href = `creature-details.html?id=${c.id}`;
                        cardsGrid.appendChild(cardItem);
                    });
                } else {
                    cardsGrid.innerHTML = `<div class="empty-msg">No schematic cards generated for this trope yet.</div>`;
                }

                // --- 2. Populate Characters (All creatures in this category) ---
                creatures.forEach(c => {
                    const creatureUrl = c.image_url || c.video_url || '../img/placeholder.png';
                    const charThumb = document.createElement('div');
                    charThumb.style.position = 'relative'; // Ensure button positioning works
                    charThumb.className = 'character-thumb';
                    charThumb.innerHTML = `
                        <img src="${creatureUrl}" alt="${c.creature_name || 'Creature'}">
                        <button class="share-card-btn" title="Copy Share Link">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="18" cy="5" r="3"></circle>
                                <circle cx="6" cy="12" r="3"></circle>
                                <circle cx="18" cy="19" r="3"></circle>
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                            </svg>
                        </button>
                    `;

                    // Copy functionality
                    const shareBtn = charThumb.querySelector('.share-card-btn');
                    if (shareBtn) {
                        shareBtn.onclick = (e) => {
                            e.stopPropagation();
                            copyShareLink(c, shareBtn);
                        };
                    }

                    charThumb.onclick = () => window.location.href = `creature-details.html?id=${c.id}`;
                    charsGrid.appendChild(charThumb);
                });
            };

            const openTradeModal = (creature) => {
                currentTradeId = creature.id;
                const modal = document.getElementById('tradeModalOverlay');
                const nameEl = document.getElementById('tradeCreatureName');
                const cardImg = document.getElementById('tradeCardImg');
                const rarityTag = document.getElementById('tradeRarityTag');
                const slider = document.getElementById('priceSlider');
                const minLabel = document.getElementById('minPriceLabel');
                const maxLabel = document.getElementById('maxPriceLabel');
                const display = document.getElementById('priceDisplay');

                nameEl.textContent = creature.creature_name || 'Unnamed Creature';
                cardImg.src = creature.card_image_url;

                const rarity = (creature.base_rarity || 'common').toLowerCase();
                const range = rarityRanges[rarity] || rarityRanges.common;

                rarityTag.textContent = rarity;
                rarityTag.className = `rarity-tag ${rarity}`;

                slider.min = range.min;
                slider.max = range.max;
                slider.value = creature.price || range.default;
                
                minLabel.textContent = range.min;
                maxLabel.textContent = range.max;
                display.textContent = slider.value;

                modal.classList.add('active');
            };

            const closeTradeModal = () => {
                document.getElementById('tradeModalOverlay').classList.remove('active');
                currentTradeId = null;
            };

            document.getElementById('closeTradeModal').onclick = closeTradeModal;
            document.getElementById('tradeModalOverlay').onclick = (e) => {
                if (e.target.id === 'tradeModalOverlay') closeTradeModal();
            };

            const slider = document.getElementById('priceSlider');
            slider.oninput = function() {
                document.getElementById('priceDisplay').textContent = this.value;
            };

            document.getElementById('submitTrade').onclick = async () => {
                if (!currentTradeId) return;

                const price = parseInt(slider.value);
                const btn = document.getElementById('submitTrade');
                const originalText = btn.textContent;
                
                btn.disabled = true;
                btn.textContent = 'Listing...';

                try {
                    await window.AumageDB.setTradeStatus(currentTradeId, true, price);
                    
                    // Update local data
                    const idx = allCreatures.findIndex(c => c.id === currentTradeId);
                    if (idx !== -1) {
                        allCreatures[idx].is_tradeable = true;
                        allCreatures[idx].price = price;
                    }

                    renderGrids(allCreatures);
                    closeTradeModal();
                } catch (err) {
                    console.error('Failed to list for trade:', err);
                    alert('Failed to list for trade. Please try again.');
                } finally {
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            };

            const copyShareLink = (creature, btn) => {
                const slug = creature.share_slug;
                const id = creature.id;
                const param = slug ? `s=${slug}` : `id=${id}`;
                const path = `${window.location.origin}/auth/creature-details.html?${param}`;

                navigator.clipboard.writeText(path).then(() => {
                    const originalInner = btn.innerHTML;
                    btn.classList.add('copied');
                    btn.innerHTML = `
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    `;
                    setTimeout(() => {
                        btn.classList.remove('copied');
                        btn.innerHTML = originalInner;
                    }, 2000);
                }).catch(err => {
                    console.error('Copy failed:', err);
                });
            };

            // 6. Search & Filters
            const applyFilters = () => {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const view = document.getElementById('viewFilter').value;
                const sort = document.getElementById('sortFilter').value;

                let filtered = allCreatures.filter(c =>
                    (c.creature_name || '').toLowerCase().includes(search) ||
                    (c.trope_class || '').toLowerCase().includes(search)
                );

                // Sorting
                if (sort === 'oldest') filtered.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                else if (sort === 'newest') filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                else if (sort === 'rarity') filtered.sort((a, b) => (b.ars || 0) - (a.ars || 0));

                renderGrids(filtered);

                // View Toggling
                const cardsSection = document.getElementById('cardsSection');
                const charactersSection = document.getElementById('charactersSection');
                if (cardsSection) cardsSection.style.display = (view === 'all' || view === 'cards') ? 'block' : 'none';
                if (charactersSection) charactersSection.style.display = (view === 'all' || view === 'characters') ? 'block' : 'none';
            };

            if (document.getElementById('searchInput')) document.getElementById('searchInput').addEventListener('input', applyFilters);
            if (document.getElementById('viewFilter')) document.getElementById('viewFilter').addEventListener('change', applyFilters);
            if (document.getElementById('sortFilter')) document.getElementById('sortFilter').addEventListener('change', applyFilters);

            // Initial load
            initializeFetch();


        });
    </script>
</body>

</html>
