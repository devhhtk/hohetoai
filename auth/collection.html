    <!-- Supabase & DB Layer -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/theme.js"></script>
    <script>
        // Init Components & Functionalities
        document.addEventListener('DOMContentLoaded', async () => {
            // Load Components
            await ComponentLoader.loadAll([
                { id: 'comp-sidebar', path: '../components/sidebar.html' },
                { id: 'comp-header', path: '../components/header.html' },
                { id: 'comp-footer', path: '../components/footer.html' }
            ]);

            // Set active nav item
            const navCreatures = document.getElementById('nav-creatures');
            if (navCreatures) {
                navCreatures.classList.add('nav-item--active');
            }

            // Database & Auth Initialization
            if (window.AumageDB) {
                window.AumageDB.init();
                await window.AumageDB.requireAuth();
            }

            // Update Header Title
            const headerTitle = document.querySelector('.top-bar__title');
            if (headerTitle) {
                headerTitle.textContent = 'Collection';
            }

            // --- Load Dynamic Counts ---
            async function loadCollectionStats() {
                if (!window.AumageDB) return;
                const counts = await window.AumageDB.getCreatureCountsByTrope();

                // Update specific tropes (aligned with mapping-v2.js + placeholders)
                const tropes = ['terratrope', 'aquatrope', 'aerotrope', 'pyrotrope', 'sonatrope', 'floratrope', 'prismatrope', 'megatrope'];

                tropes.forEach(t => {
                    const count = counts[t] || 0;
                    const el = document.getElementById(`count-${t}`);
                    if (el) {
                        el.textContent = `${count} Creation${count === 1 ? '' : 's'}`;
                    }
                });
            }

            // Run count load
            loadCollectionStats();

            // --- Trope Card Clicks ---
            const tropeCards = document.querySelectorAll('.trope-card');
            tropeCards.forEach(card => {
                card.addEventListener('click', () => {
                    const trope = card.getAttribute('data-trope');
                    if (trope) {
                        window.location.href = `trope-details.html?trope=${trope}`;
                    }
                });
            });

            // --- Sidebar & Profile UI ---
            const profileToggle = document.getElementById('profileToggle');
            const profileDropup = document.getElementById('profileDropup');

            if (profileToggle && profileDropup) {
                profileToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    profileDropup.classList.toggle('profile-dropup--active');
                });

                document.addEventListener('click', () => {
                    profileDropup.classList.remove('profile-dropup--active');
                });

                profileDropup.addEventListener('click', (e) => {
                    e.stopPropagation();
                });
            }


        });
    </script>
