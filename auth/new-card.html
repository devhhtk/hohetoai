<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalize Card — HoHeTo Kyle</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/cardview.css">
</head>

<body class="dashboard-body">

    <!-- ══ Sidebar Placeholder ══ -->
    <div id="comp-sidebar"></div>

    <!-- ══ Main Content Area ══ -->
    <main class="main-area">

        <!-- Top Navigation Bar Placeholder -->
        <div id="comp-header"></div>

        <!-- Dynamic Content View -->
        <div class="content-view">

            <div class="card-view-container" style="min-height: 80vh; flex-direction: row; gap: 40px;">
                
                <!-- Left: Info & Actions -->
                <div class="card-controls" style="max-width: 400px;">
                    <div class="card-status-header">
                        <h1 class="card-status-title" id="mainTitle">Card Preview</h1>
                        <p class="card-status-desc" id="statusDesc">Review your high-fidelity schematic. Check the DNA mapping and biometrics before archiving to the vault.</p>
                    </div>

                    <div class="card-actions" id="actionPanel" style="display: none; margin-top: 30px;">
                        <button class="btn-finalize" id="saveVaultBtn">
                             Save to Vault
                        </button>
                        <button class="btn-secondary-outline" onclick="window.location.href='dashboard.html'" style="margin-top: 15px; width: 100%;">
                             Start Over
                        </button>
                    </div>
                </div>

                <!-- Right: Card Preview -->
                <div class="card-canvas-wrapper" id="cardWrapper" style="width: 500px; max-width: 95vw;">
                    <div id="cardTarget">
                         <canvas id="finalCardCanvas" style="width: 100%; display: block;"></canvas>
                    </div>
                    
                    <!-- Loading Overlay -->
                    <div class="card-loading-overlay" id="loadingOverlay">
                        <div class="spinner"></div>
                        <span class="loading-text" id="loadingText">Developing Schematic...</span>
                    </div>
                </div>
            </div>

            <!-- Footer Placeholder -->
            <div id="comp-footer"></div>

        </div>
    </main>

    <!-- JS Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/card-compositor.js"></script>
    <script src="../js/components.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Load Components
            await ComponentLoader.loadAll([
                { id: 'comp-sidebar', path: '../components/sidebar.html' },
                { id: 'comp-header', path: '../components/header.html' },
                { id: 'comp-footer', path: '../components/footer.html' }
            ]);

            // Database & Auth Initialization
            if (window.AumageDB) {
                window.AumageDB.init();
                await window.AumageDB.requireAuth();
            }

            const params = new URLSearchParams(window.location.search);
            const creatureId = params.get('id');

            if (!creatureId) {
                document.getElementById('loadingText').textContent = 'No Creature ID.';
                return;
            }

            try {
                // 1. Fetch Creature Data
                const creature = await AumageAPI.getCreature(creatureId);
                if (!creature) throw new Error('Creature not found');

                // 2. Prepare Card Data
                const cardData = {
                    name: creature.creature_name || 'Experiment #' + creatureId.substring(0,4),
                    creatureUrl: creature.card_url || creature.creature_url || '../img/placeholder.png',
                    gen: creature.gen_type || 'Resogen',
                    trope: creature.trope_class || 'Terratrope',
                    rarity: creature.base_rarity || 'Abundant',
                    species: creature.morphology || 'Unknown',
                    element: creature.element || 'Shadow',
                    stats: creature.variant_tags || { power: 50, agility: 50, defense: 50, arcana: 50 },
                    specimenId: creature.serial_number || 'SPEC-' + creatureId.substring(0,8),
                    geneSequence: creature.waveform_hash?.substring(0, 16) || 'AGCT-TCGA-GATC-CTAG'
                };

                // 3. Render Card for Preview
                const canvas = document.getElementById('finalCardCanvas');
                const renderedCanvas = await AumageCard.render(cardData);
                
                canvas.width = renderedCanvas.width;
                canvas.height = renderedCanvas.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(renderedCanvas, 0, 0);

                // 4. Show UI
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('actionPanel').style.display = 'block';

                // 5. Handle Save
                const saveBtn = document.getElementById('saveVaultBtn');
                saveBtn.onclick = async () => {
                    saveBtn.disabled = true;
                    saveBtn.textContent = 'Archiving...';
                    
                    try {
                        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                        const fileName = `schematic-${creatureId}`;
                        const cardImageUrl = await AumageDB.uploadCardImage(blob, fileName);
                        
                        if (!cardImageUrl) throw new Error('Upload failed');
                        await AumageDB.updateCreature(creatureId, { card_image_url: cardImageUrl });

                        saveBtn.textContent = 'Saved to Vault!';
                        saveBtn.classList.add('success');
                        setTimeout(() => window.location.href = 'collection.html', 1500);
                    } catch (e) {
                        alert('Storage Error: ' + e.message);
                        saveBtn.disabled = false;
                        saveBtn.textContent = 'Save to Vault';
                    }
                };

            } catch (err) {
                console.error('Final Preview Error:', err);
                document.getElementById('loadingText').textContent = 'Error: ' + err.message;
            }
        });
    </script>
</body>

</html>
