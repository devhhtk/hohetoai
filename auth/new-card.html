<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalize Card — HoHeTo Kyle</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/cardview.css">
</head>

<body class="dashboard-body">

    <!-- ══ Sidebar Placeholder ══ -->
    <div id="comp-sidebar"></div>

    <!-- ══ Main Content Area ══ -->
    <main class="main-area">

        <!-- Top Navigation Bar Placeholder -->
        <div id="comp-header"></div>

        <!-- Dynamic Content View -->
        <div class="content-view">

            <div class="card-view-container" style="min-height: 80vh;">
                <!-- Card Display -->
                <div class="card-canvas-wrapper" id="cardWrapper" style="width: 500px; max-width: 95vw;">
                    <!-- Final PNG will be injected here as an <img> for best quality/sharing -->
                    <div id="cardTarget">
                         <canvas id="finalCardCanvas" style="display: none;"></canvas>
                    </div>
                    
                    <!-- Loading Overlay -->
                    <div class="card-loading-overlay" id="loadingOverlay">
                        <div class="spinner"></div>
                        <span class="loading-text" id="loadingText">Accessing Vault...</span>
                    </div>
                </div>

                <!-- Subtle Actions -->
                <div class="card-actions-row" id="finalActions" style="display: none; margin-top: 30px; gap: 20px;">
                    <button class="btn-secondary-outline" onclick="window.location.href='collection.html'">Collection</button>
                    <button class="btn-primary-solid" onclick="window.location.href='dashboard.html'">New Creation</button>
                </div>
            </div>

            <!-- Footer Placeholder -->
            <div id="comp-footer"></div>

        </div>
    </main>

    <!-- JS Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/card-compositor.js"></script>
    <script src="../js/components.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Load Components
            await ComponentLoader.loadAll([
                { id: 'comp-sidebar', path: '../components/sidebar.html' },
                { id: 'comp-header', path: '../components/header.html' },
                { id: 'comp-footer', path: '../components/footer.html' }
            ]);

            // Database & Auth Initialization
            if (window.AumageDB) {
                window.AumageDB.init();
                await window.AumageDB.requireAuth();
            }

            // Get creature ID
            const params = new URLSearchParams(window.location.search);
            const creatureId = params.get('id');

            if (!creatureId) {
                document.getElementById('loadingText').textContent = 'No Creature ID.';
                return;
            }

            try {
                // 1. Fetch Creature Data
                const creature = await AumageAPI.getCreature(creatureId);
                if (!creature) throw new Error('Creature not found');

                const target = document.getElementById('cardTarget');

                // 2. Check if Card already exists
                if (creature.card_image_url) {
                    showFinalCard(creature.card_image_url);
                    return;
                }

                // 3. Otherwise, Render and Save Automatically
                document.getElementById('loadingText').textContent = 'Rendering Schematic...';
                
                const cardData = {
                    name: creature.creature_name || 'Experiment #' + creatureId.substring(0,4),
                    creatureUrl: creature.card_url || creature.creature_url || '../img/placeholder.png',
                    gen: creature.gen_type || 'Resogen',
                    trope: creature.trope_class || 'Terratrope',
                    rarity: creature.base_rarity || 'Abundant',
                    species: creature.morphology || 'Unknown',
                    element: creature.element || 'Shadow',
                    stats: creature.variant_tags || { power: 50, agility: 50, defense: 50, arcana: 50 },
                    specimenId: creature.serial_number || 'SPEC-' + creatureId.substring(0,8),
                    geneSequence: creature.waveform_hash?.substring(0, 16) || 'AGCT-TCGA-GATC-CTAG'
                };

                const canvas = await AumageCard.render(cardData);
                
                document.getElementById('loadingText').textContent = 'Archiving to Bucket...';
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                const fileName = `schematic-${creatureId}`;
                const cardImageUrl = await AumageDB.uploadCardImage(blob, fileName);
                
                if (!cardImageUrl) throw new Error('Upload failed');

                // Update DB
                await AumageDB.updateCreature(creatureId, { card_image_url: cardImageUrl });

                showFinalCard(cardImageUrl);

            } catch (err) {
                console.error('Final Viewer Error:', err);
                document.getElementById('loadingText').textContent = 'Error: ' + err.message;
            }

            function showFinalCard(url) {
                const target = document.getElementById('cardTarget');
                const img = new Image();
                img.src = url;
                img.style.width = '100%';
                img.style.display = 'block';
                img.onload = () => {
                    target.innerHTML = '';
                    target.appendChild(img);
                    document.getElementById('loadingOverlay').style.display = 'none';
                    document.getElementById('finalActions').style.display = 'flex';
                };
            }
        });
    </script>
</body>

</html>
