<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalize Card — HoHeTo Kyle</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/cardview.css">
</head>

<body class="dashboard-body">

    <!-- ══ Sidebar Placeholder ══ -->
    <div id="comp-sidebar"></div>

    <!-- ══ Main Content Area ══ -->
    <main class="main-area">

        <!-- Top Navigation Bar Placeholder -->
        <div id="comp-header"></div>

        <!-- Dynamic Content View -->
        <div class="content-view">

            <div class="card-view-container">
                <!-- Left: Controls -->
                <div class="card-controls" id="controlsPanel">
                    <div class="card-status-header">
                        <h1 class="card-status-title" id="mainTitle">Developing Schematic...</h1>
                        <p class="card-status-desc" id="statusDesc">Wait a moment while we process the high-fidelity DNA schematic and archive it into the vault.</p>
                    </div>

                    <!-- Action Panel (Initially Hidden) -->
                    <div class="card-actions" id="actionPanel" style="display: none;">
                        <button class="btn-finalize" onclick="window.location.href='collection.html'">
                            View My Collection
                        </button>
                        <a href="dashboard.html" class="btn-back">Return to Dashboard</a>
                    </div>

                    <!-- Success State (Hidden) -->
                    <div id="successState" style="display: none; text-align: center;">
                        <div class="success-check">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </div>
                        <h2 style="font-family: 'Exo 2'; font-size: 28px; margin-bottom: 10px;">Card Archived!</h2>
                        <p style="color: var(--text-muted); margin-bottom: 30px;">The schematic card has been stored in the vault and linked to your creature record.</p>
                    </div>
                </div>

                <!-- Right: Card Preview -->
                <div class="card-canvas-wrapper" id="cardWrapper">
                    <canvas id="finalCardCanvas"></canvas>
                    
                    <!-- Loading Overlay -->
                    <div class="card-loading-overlay" id="loadingOverlay">
                        <div class="spinner"></div>
                        <span class="loading-text" id="loadingText">Analyzing Biometrics...</span>
                    </div>
                </div>
            </div>

            <!-- Footer Placeholder -->
            <div id="comp-footer"></div>

        </div>
    </main>

    <!-- JS Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/card-compositor.js"></script>
    <script src="../js/components.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Load Components
            await ComponentLoader.loadAll([
                { id: 'comp-sidebar', path: '../components/sidebar.html' },
                { id: 'comp-header', path: '../components/header.html' },
                { id: 'comp-footer', path: '../components/footer.html' }
            ]);

            // Database & Auth Initialization
            if (window.AumageDB) {
                window.AumageDB.init();
                await window.AumageDB.requireAuth();
            }

            // Init Card
            const params = new URLSearchParams(window.location.search);
            const creatureId = params.get('id');

            if (!creatureId) {
                document.getElementById('loadingText').textContent = 'No Creature ID found.';
                document.getElementById('loadingText').style.color = '#ff4444';
                return;
            }

            try {
                // 1. Fetch Creature Data
                document.getElementById('loadingText').textContent = 'Fetching Neural Data...';
                const creature = await AumageAPI.getCreature(creatureId);
                if (!creature) throw new Error('Creature not found');

                // 2. Prepare Card Data
                const cardData = {
                    name: creature.creature_name || 'Experiment #' + creatureId.substring(0,4),
                    creatureUrl: creature.card_url || creature.creature_url || '../img/placeholder.png',
                    gen: creature.gen_type || 'Resogen',
                    trope: creature.trope_class || 'Terratrope',
                    rarity: creature.base_rarity || 'Abundant',
                    species: creature.morphology || 'Unknown',
                    element: creature.element || 'Shadow',
                    stats: creature.variant_tags || { power: 50, agility: 50, defense: 50, arcana: 50 },
                    specimenId: creature.serial_number || 'SPEC-' + creatureId.substring(0,8),
                    geneSequence: creature.waveform_hash?.substring(0, 16) || 'AGCT-TCGA-GATC-CTAG'
                };

                // 3. Render Card
                document.getElementById('loadingText').textContent = 'Rendering Schematic...';
                const canvas = document.getElementById('finalCardCanvas');
                const renderedCanvas = await AumageCard.render(cardData);
                
                // Copy to visible canvas
                const ctx = canvas.getContext('2d');
                canvas.width = renderedCanvas.width;
                canvas.height = renderedCanvas.height;
                ctx.drawImage(renderedCanvas, 0, 0);

                // 4. Automatic Archiving
                document.getElementById('loadingText').textContent = 'Archiving to Bucket...';
                
                // Convert to Blob
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                
                // Upload to Bucket
                const fileName = `schematic-${creatureId}`;
                const cardImageUrl = await AumageDB.uploadCardImage(blob, fileName);
                
                if (!cardImageUrl) throw new Error('Vault upload failed. Check connection.');

                // Update DB
                await AumageDB.updateCreature(creatureId, {
                    card_image_url: cardImageUrl
                });

                // 5. Finalize UI
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainTitle').textContent = 'Schematic Finalized';
                document.getElementById('statusDesc').textContent = 'Archive complete. Your digital collectible is now permanently stored in the high-fidelity vault.';
                document.getElementById('successState').style.display = 'block';
                document.getElementById('actionPanel').style.display = 'flex';

            } catch (err) {
                console.error('Generation/Archive error:', err);
                document.getElementById('loadingText').textContent = 'System Failure: ' + err.message;
                document.getElementById('loadingText').style.color = '#ff4444';
            }
        });
    </script>
</body>

</html>
