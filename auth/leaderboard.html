<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Leaderboard — HoHeTo Kyle</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body class="dashboard-body page-leaderboard">

    <!-- ══ Sidebar Placeholder ══ -->
    <div id="comp-sidebar"></div>

    <!-- ══ Main Content Area ══ -->
    <main class="main-area">

        <!-- Top Navigation Bar Placeholder -->
        <div id="comp-header"></div>

        <!-- Dynamic Content View -->
        <div class="content-view">

            <!-- Welcome Header -->
            <div class="welcome-section">
                <h1 class="welcome-title">Global Leaderboard</h1>
                <p class="welcome-subtitle">The top storytellers and creature masters.</p>
            </div>

            <!-- Leaderboard Section -->
            <section class="dashboard-section">
                <div class="leaderboard-wrapper">
                    <div class="leaderboard-main">
                        <div class="leaderboard-container">
                            <div class="leaderboard-header">
                                <h3 class="section-title">Global Rankings</h3>
                            </div>
                            <div class="leaderboard-table-header">
                                <span class="col-rank">RANK</span>
                                <span class="col-user">STORYTELLER</span>
                                <span class="col-progress">PROGRESS</span>
                                <span class="col-cards">CARDS</span>
                            </div>
                            <div class="leaderboard-list" id="leaderboardList">
                                <!-- Populated via JS -->
                                <div class="streak-loading"></div>
                            </div>
                            <div id="yourRank"></div>
                        </div>
                    </div>

                    <!-- Top 1 Showcase -->
                    <div class="leaderboard-showcase">
                        <div class="showcase-content">
                            <div class="top-badge">★★★</div>
                            <div class="top-creature-info">
                                <h4 id="top-ranker-name">---</h4>
                                <p>Latest Discovery</p>
                            </div>
                            <div class="top-image-container">
                                <div class="image-loader" id="showcase-loader"></div>
                                <img id="top-creature-img" src="../img/placeholder.png" alt="Top Ranker Creature">
                            </div>
                            <div class="showcase-decor"></div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Footer Placeholder -->
            <div id="comp-footer"></div>

        </div>
    </main>

    <!-- Supabase & DB Layer -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/theme.js"></script>
    <script>
        // Init Components & Functionalities
        document.addEventListener('DOMContentLoaded', async () => {
            // Load Components
            await ComponentLoader.loadAll([
                { id: 'comp-sidebar', path: '../components/sidebar.html' },
                { id: 'comp-header', path: '../components/header.html' },
                { id: 'comp-footer', path: '../components/footer.html' }
            ]);

            // Set active nav item
            const navLeaderboard = document.getElementById('nav-leaderboard');
            if (navLeaderboard) navLeaderboard.classList.add('nav-item--active');

            // Database & Auth Initialization
            if (window.AumageDB) {
                window.AumageDB.init();
                await window.AumageDB.requireAuth();
            }

            // --- Sidebar & Profile UI ---
            const profileToggle = document.getElementById('profileToggle');
            const profileDropup = document.getElementById('profileDropup');

            if (profileToggle && profileDropup) {
                profileToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    profileDropup.classList.toggle('profile-dropup--active');
                });

                document.addEventListener('click', () => {
                    profileDropup.classList.remove('profile-dropup--active');
                });

                profileDropup.addEventListener('click', (e) => {
                    e.stopPropagation();
                });
            }

            // --- Load Leaderboard ---
            async function loadLeaderboard() {
                const list = document.getElementById('leaderboardList');
                const topName = document.getElementById('top-ranker-name');
                const topImg = document.getElementById('top-creature-img');
                const showcaseLoader = document.getElementById('showcase-loader');

                if (!list || !window.AumageDB) return;

                const leaderboard = await window.AumageDB.getLeaderboard(20); // More for a dedicated page
                if (leaderboard && leaderboard.length > 0) {
                    // Update Top 1 Showcase
                    const top1 = leaderboard[0];
                    if (top1) {
                        topName.textContent = top1.display_name || top1.id.substring(0, 8);

                        // Start loading visual
                        topImg.classList.add('image-changing');
                        if (showcaseLoader) showcaseLoader.classList.add('loader-active');

                        try {
                            const topCard = await window.AumageDB.getUserRecentCard(top1.id);
                            if (topCard && topCard.card_image_url) {
                                // Preload
                                const imgPreload = new Image();
                                imgPreload.src = topCard.card_image_url;
                                await imgPreload.decode();
                                topImg.src = topCard.card_image_url;
                            } else {
                                topImg.src = '../img/placeholder.png';
                            }
                        } catch (e) {
                            topImg.src = '../img/placeholder.png';
                        } finally {
                            topImg.classList.remove('image-changing');
                            if (showcaseLoader) showcaseLoader.classList.remove('loader-active');
                        }
                    }

                    list.innerHTML = leaderboard.map((user, index) => {
                        const displayName = user.display_name || user.id.substring(0, 8);
                        const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=random&color=fff&size=128`;

                        // Progress calculation (Mock or based on profile data if available)
                        // For leaderboard, we show total XP as the major value
                        const totalXP = user.total_xp || 0;
                        const level = user.level || 1;

                        // Simple placeholder for progress bar width
                        // Ideally we'd fetch actual level thresholds, but for 'structure' we show the bar
                        const progressPct = 65;

                        return `
                        <div class="leaderboard-item ${index === 0 ? 'leaderboard-item--active' : ''}" 
                             data-user-id="${user.id}" 
                             data-user-name="${displayName}">
                            
                            <div class="item-rank">${index + 1}</div>
                            
                            <div class="item-profile">
                                <div class="item-avatar">
                                    <img src="${avatarUrl}" alt="avatar">
                                </div>
                                <div class="user-meta">
                                    <span class="item-name">${displayName}</span>
                                    <span class="item-level">Level ${level}</span>
                                </div>
                            </div>
                            
                            <div class="item-progress">
                                <span class="progress-label">${totalXP.toLocaleString()} XP</span>
                                <div class="progress-bar-container">
                                    <div class="progress-bar-fill" style="width: ${progressPct}%"></div>
                                </div>
                            </div>

                            <div class="item-cards-stack">
                                <div class="cards-icon">
                                    <img src="../img/dragon.png" alt="cards">
                                    <span class="cards-val">${user.creature_count}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    }).join('');

                    // Add click listeners to items
                    const items = list.querySelectorAll('.leaderboard-item');

                    items.forEach(item => {
                        item.addEventListener('click', async () => {
                            // UI Feedback
                            items.forEach(i => i.classList.remove('leaderboard-item--active'));
                            item.classList.add('leaderboard-item--active');

                            const uID = item.getAttribute('data-user-id');
                            const uName = item.getAttribute('data-user-name');

                            // Update UI
                            topName.textContent = uName;

                            // Visual feedback (start loading)
                            topImg.classList.add('image-changing');
                            if (showcaseLoader) showcaseLoader.classList.add('loader-active');

                            try {
                                const card = await window.AumageDB.getUserRecentCard(uID);

                                // Preload image to avoid jumpy transitions
                                if (card && card.card_image_url) {
                                    const imgPreload = new Image();
                                    imgPreload.src = card.card_image_url;
                                    await imgPreload.decode();
                                    topImg.src = card.card_image_url;
                                } else {
                                    topImg.src = '../img/placeholder.png'; // Fallback
                                }
                            } catch (err) {
                                console.error("Error loading card:", err);
                                topImg.src = '../img/placeholder.png';
                            } finally {
                                // End loading juice
                                topImg.classList.remove('image-changing');
                                if (showcaseLoader) showcaseLoader.classList.remove('loader-active');
                            }
                        });
                    });

                    // Populate Your Rank (Dynamic)
                    if (window.AumageDB.user) {
                        const currentUserId = window.AumageDB.user.id;
                        const userIndex = leaderboard.findIndex(u => u.id === currentUserId);

                        // Get user profile for level and display name
                        // 1. Check if user is already in the leaderboard array
                        const inLeaderboard = userIndex !== -1 ? leaderboard[userIndex] : null;

                        let profile = {};
                        let profileData = null;

                        if (inLeaderboard) {
                            profile = {
                                level: inLeaderboard.level,
                                total_xp: inLeaderboard.total_xp,
                                display_name: inLeaderboard.display_name,
                                avatar_url: inLeaderboard.avatar_url
                            };
                        } else {
                            // 2. Fallback to live profile fetch
                            profileData = await window.AumageDB.getUserProfile();
                            profile = profileData?.profile || {};
                        }

                        const targetLevel = profileData?.target_level || { xp_required: (profile.level || 1) * 1000 };
                        const baseXP = profileData?.base_xp || 0;

                        // Calculate actual progress for your bar
                        const currentXP = profile.total_xp || 0;
                        const reqXP = targetLevel.xp_required || 1000;
                        const threshXP = baseXP;
                        const xpInLevel = currentXP - threshXP;
                        const rangeInLevel = reqXP - threshXP;
                        const myProgressPct = Math.min(100, Math.max(0, (xpInLevel / rangeInLevel) * 100));

                        const displayName = profile.display_name || window.AumageDB.user.email?.split('@')[0] || 'You';
                        const avatarUrl = profile.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=08D2C1&color=fff&size=128`;

                        // Get user creature count (since leaderboard only counts cards, let's be consistent)
                        // Actually leaderboard counts creatures with cards.
                        const { count: cardCount } = await window.AumageDB.supabase
                            .from('creatures')
                            .select('*', { count: 'exact', head: true })
                            .eq('user_id', currentUserId)
                            .neq('card_image_url', '')
                            .not('card_image_url', 'is', null);

                        const yourRankEl = document.getElementById('yourRank');
                        if (yourRankEl) {
                            yourRankEl.innerHTML = `
                                <div class="leaderboard-footer">
                                    <div class="leaderboard-item your-rank-item" style="margin-bottom: 0;">
                                        <div class="item-rank">${userIndex !== -1 ? userIndex + 1 : '>20'}</div>
                                        
                                        <div class="item-profile">
                                            <div class="item-avatar">
                                                <img src="${avatarUrl}" alt="avatar">
                                            </div>
                                            <div class="user-meta">
                                                <span class="item-name">${displayName} (You)</span>
                                                <span class="item-level">Level ${profile.level || 1}</span>
                                            </div>
                                        </div>
                                        
                                        <div class="item-progress">
                                            <span class="progress-label">${(profile.total_xp || 0).toLocaleString()} XP</span>
                                            <div class="progress-bar-container">
                                                <div class="progress-bar-fill" style="width: ${myProgressPct}%"></div>
                                            </div>
                                        </div>

                                        <div class="item-cards-stack">
                                            <div class="cards-icon">
                                                <span class="cards-val">${cardCount || 0}</span>
                                            </div>
                                            <span class="cards-label">CARDS</span>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }
                    }
                } else {
                    list.innerHTML = '<div class="empty-msg">No legendaries yet.</div>';
                }
            }

            // Run initial load
            loadLeaderboard();
        });
    </script>
</body>

</html>
