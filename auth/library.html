<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Library | HoHeTo Kai</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/library.css">
</head>
<body class="dashboard-body">

    <!-- Sidebar Placeholder -->
    <div id="comp-sidebar"></div>

    <main class="main-area">
        <!-- Global Header Placeholder -->
        <div id="comp-header"></div>

        <div class="library-container">
            <!-- Page Header -->
            <header class="library-header">
                <h1 class="library-title">Sound Library</h1>
            </header>

            <!-- Controls -->
            <div class="library-controls">
                <div class="search-wrap">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21l-4.35-4.35"></path>
                    </svg>
                    <input type="text" class="search-input" placeholder="Search sounds...">
                </div>

                <select class="sort-select">
                    <option>Sort: Newest First</option>
                    <option>Sort: Oldest First</option>
                    <option>Sort: Name A-Z</option>
                </select>

                <button class="btn-upload">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Upload
                </button>
            </div>

            <!-- Sound List -->
            <div class="sound-list" id="sound-list">
                
                <!-- Sound Item 1 -->
                <div class="sound-row-wrapper">
                    <div class="sound-row" onclick="toggleLibraryItem(this)">
                        <div class="sound-info">
                            <span class="sound-name">Aqua Dreams</span>
                        </div>
                        <div class="mini-player">
                            <button class="btn-play-toggle">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                </svg>
                            </button>
                            <span class="player-duration">0:28</span>
                            <div class="player-progress-wrap">
                                <div class="player-progress-bar" style="width: 45%;"></div>
                            </div>
                            <div class="player-volume">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                                </svg>
                            </div>
                        </div>
                        <div class="row-actions">
                            <button class="action-btn">Edit Name</button>
                            <button class="action-btn">Download</button>
                            <button class="action-btn">Remove</button>
                            <button class="action-btn" style="color: var(--color-primary); border-color: rgba(8,210,193,0.2);">Use in Lab</button>
                        </div>
                    </div>
                    <div class="dna-expanded-view">
                        <div class="dna-main-viz">
                            <div class="dna-circle-metrics">
                                <div class="circle-metric">
                                    <span class="metric-label">Harmony</span>
                                    <svg class="circle-svg"><circle class="circle-bg" cx="30" cy="30" r="26"></circle><circle class="circle-progress" cx="30" cy="30" r="26" style="stroke-dashoffset: 80;"></circle></svg>
                                    <span class="metric-value">53%</span>
                                </div>
                                <div class="circle-metric">
                                    <span class="metric-label">Complexity</span>
                                    <svg class="circle-svg"><circle class="circle-bg" cx="30" cy="30" r="26"></circle><circle class="circle-progress" cx="30" cy="30" r="26" style="stroke-dashoffset: 150;"></circle></svg>
                                    <span class="metric-value">18%</span>
                                </div>
                                <div class="circle-metric">
                                    <span class="metric-label">Intensity</span>
                                    <svg class="circle-svg"><circle class="circle-bg" cx="30" cy="30" r="26"></circle><circle class="circle-progress" cx="30" cy="30" r="26" style="stroke-dashoffset: 40;"></circle></svg>
                                    <span class="metric-value">79%</span>
                                </div>
                            </div>
                            <canvas class="dna-waveform-canvas"></canvas>
                            <div class="expanded-dna-player">
                                <button class="btn-play-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                                <span class="player-duration">0:00</span>
                                <div class="player-progress-wrap"><div class="player-progress-bar"></div></div>
                                <div class="player-volume"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon></svg></div>
                            </div>
                        </div>
                        <div class="dna-stats-grid">
                            <div class="dna-stat-item stat-complexity"><div class="dna-stat-label-row"><span class="dna-stat-name">Complexity</span><span class="dna-stat-percent">30%</span></div><div class="dna-stat-bar-outer"><div class="dna-stat-bar-inner" style="width: 30%;"></div></div></div>
                            <div class="dna-stat-item stat-intensity"><div class="dna-stat-label-row"><span class="dna-stat-name">Intensity</span><span class="dna-stat-percent">18%</span></div><div class="dna-stat-bar-outer"><div class="dna-stat-bar-inner" style="width: 18%;"></div></div></div>
                            <div class="dna-stat-item stat-harmony"><div class="dna-stat-label-row"><span class="dna-stat-name">Harmony</span><span class="dna-stat-percent">50%</span></div><div class="dna-stat-bar-outer"><div class="dna-stat-bar-inner" style="width: 50%;"></div></div></div>
                            <div class="dna-stat-item stat-warmth"><div class="dna-stat-label-row"><span class="dna-stat-name">Warmth</span><span class="dna-stat-percent">90%</span></div><div class="dna-stat-bar-outer"><div class="dna-stat-bar-inner" style="width: 90%;"></div></div></div>
                            <div class="dna-stat-item stat-roughness"><div class="dna-stat-label-row"><span class="dna-stat-name">Roughness</span><span class="dna-stat-percent">23%</span></div><div class="dna-stat-bar-outer"><div class="dna-stat-bar-inner" style="width: 23%;"></div></div></div>
                            <div class="dna-stat-item stat-brightness"><div class="dna-stat-label-row"><span class="dna-stat-name">Brightness</span><span class="dna-stat-percent">28%</span></div><div class="dna-stat-bar-outer"><div class="dna-stat-bar-inner" style="width: 28%;"></div></div></div>
                        </div>
                    </div>
                </div>

                <!-- Sound Item 2 -->
                <div class="sound-row-wrapper">
                    <div class="sound-row" onclick="toggleLibraryItem(this)">
                        <div class="sound-info"><span class="sound-name">Mystic Portal</span></div>
                        <div class="mini-player">
                            <button class="btn-play-toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                            <span class="player-duration">0:11</span>
                            <div class="player-progress-wrap"><div class="player-progress-bar"></div></div>
                            <div class="player-volume"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon></svg></div>
                        </div>
                        <div class="row-actions">
                            <button class="action-btn">Edit Name</button><button class="action-btn">Download</button><button class="action-btn">Remove</button><button class="action-btn">Use in Lab</button>
                        </div>
                    </div>
                    <div class="dna-expanded-view"></div>
                </div>

                <!-- Repeat Demo Rows -->
                <script>
                    const demoNames = ["Neon Lights", "Crimson Tide", "Amber Waves", "Frozen Tundra", "Solar Wind", "Lunar Landing", "Galactic Core", "Supernova"];
                    const list = document.getElementById('sound-list');
                    demoNames.forEach(name => {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'sound-row-wrapper';
                        wrapper.innerHTML = `
                            <div class="sound-row" onclick="toggleLibraryItem(this)">
                                <div class="sound-info"><span class="sound-name">${name}</span></div>
                                <div class="mini-player">
                                    <button class="btn-play-toggle"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                                    <span class="player-duration">0:15</span>
                                    <div class="player-progress-wrap"><div class="player-progress-bar"></div></div>
                                    <div class="player-volume"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon></svg></div>
                                </div>
                                <div class="row-actions">
                                    <button class="action-btn">Edit Name</button><button class="action-btn">Download</button><button class="action-btn">Remove</button><button class="action-btn">Use in Lab</button>
                                </div>
                            </div>
                            <div class="dna-expanded-view"></div>
                        `;
                        list.appendChild(wrapper);
                    });
                </script>

            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script src="../js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Database Init
            if (window.AumageDB) {
                window.AumageDB.init();
                const session = await window.AumageDB.requireAuth();
                if (!session) return;
            }

            // Load Components
            await ComponentLoader.loadAll([
                { id: 'comp-sidebar', path: '../components/sidebar.html' },
                { id: 'comp-header', path: '../components/header.html' }
            ]);
            
            // Set active nav
            const navItem = document.getElementById('nav-library');
            if (navItem) navItem.classList.add('nav-item--active');

            // Update stats
            if (window.AumageDB) {
                await window.AumageDB.updateSidebarStats();
            }

            // Profile Dropdown Logic
            const profileToggle = document.getElementById('profileToggle');
            const profileDropup = document.getElementById('profileDropup');

            if (profileToggle && profileDropup) {
                profileToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    profileDropup.classList.toggle('profile-dropup--active');
                });

                document.addEventListener('click', () => {
                    profileDropup.classList.remove('profile-dropup--active');
                });

                profileDropup.addEventListener('click', (e) => e.stopPropagation());
            }

            // Draw waveforms
            function drawWaveforms() {
                document.querySelectorAll('.dna-waveform-canvas').forEach(canvas => {
                    const ctx = canvas.getContext('2d');
                    canvas.width = canvas.offsetWidth;
                    canvas.height = canvas.offsetHeight;
                    ctx.strokeStyle = '#08D2C1';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const centerY = canvas.height / 2;
                    for (let x = 0; x < canvas.width; x += 4) {
                        const h = Math.abs(Math.sin(x * 0.05)) * 40 + Math.random() * 10;
                        ctx.moveTo(x, centerY - h/2);
                        ctx.lineTo(x, centerY + h/2);
                    }
                    ctx.stroke();
                });
            }
            
            drawWaveforms();
            // Re-draw on expand
            window.drawWaveforms = drawWaveforms;
        });

        function toggleLibraryItem(row) {
            const wrapper = row.parentElement;
            const dnaView = wrapper.querySelector('.dna-expanded-view');
            
            // Close all others
            document.querySelectorAll('.sound-row-wrapper').forEach(w => {
                if (w !== wrapper) {
                    w.querySelector('.sound-row').classList.remove('sound-row--active');
                    w.querySelector('.dna-expanded-view').classList.remove('active');
                }
            });

            // Toggle current
            row.classList.toggle('sound-row--active');
            dnaView.classList.toggle('active');
            
            // If it's empty (demo), add some dummy DNA content if needed
            if (dnaView.classList.contains('active')) {
                if (dnaView.innerHTML === '') {
                    dnaView.innerHTML = document.querySelector('.dna-expanded-view').innerHTML;
                }
                setTimeout(() => window.drawWaveforms(), 50);
            }
        }
    </script>
</body>
</html>
