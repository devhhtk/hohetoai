<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox — HoHeTo Kyle</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/inbox.css">
</head>

<body class="dashboard-body">

    <!-- ══ Sidebar Placeholder ══ -->
    <div id="comp-sidebar"></div>

    <!-- ══ Main Content Area ══ -->
    <main class="main-area">

        <!-- Top Navigation Bar Placeholder -->
        <div id="comp-header"></div>

        <!-- Dynamic Content View -->
        <div class="content-view inbox-view">
            <div class="inbox-container">
                <!-- Sub Sidebar: User List -->
                <aside class="inbox-sidebar">
                    <div class="inbox-sidebar__header">
                        <h2 class="inbox-sidebar__title">Messages</h2>
                        <div class="inbox-search">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input type="text" placeholder="Search conversations...">
                        </div>
                    </div>
                    <div class="conversation-list">
                        <!-- Skeleton Loaders -->
                        <div class="skeleton-item">
                            <div class="skeleton-avatar"></div>
                            <div class="skeleton-content">
                                <div class="skeleton-line"></div>
                                <div class="skeleton-line"></div>
                            </div>
                        </div>
                        <div class="skeleton-item">
                            <div class="skeleton-avatar"></div>
                            <div class="skeleton-content">
                                <div class="skeleton-line"></div>
                                <div class="skeleton-line"></div>
                            </div>
                        </div>
                        <div class="skeleton-item">
                            <div class="skeleton-avatar"></div>
                            <div class="skeleton-content">
                                <div class="skeleton-line"></div>
                                <div class="skeleton-line"></div>
                            </div>
                        </div>
                    </div>
                </aside>

                <!-- Chat Area -->
                <section class="chat-area">
                    <!-- Default Empty State -->
                    <div class="chat-empty-state">
                        <div class="chat-empty-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                        </div>
                        <h3 class="chat-empty-title">Your Messages</h3>
                        <p class="chat-empty-text">Select a conversation from the left to start chatting with your friends and teammates.</p>
                    </div>

                    <!-- Chat Content (Hidden by default) -->
                    <div class="chat-main" style="display: none; height: 100%; flex-direction: column;">
                        <!-- Chat Header -->
                        <div class="chat-header">
                            <div class="chat-user-info">
                                <img src="" alt="User" class="chat-user-avatar">
                                <div class="chat-user-details">
                                    <span class="chat-user-name">Select a user</span>
                                    <span class="chat-user-status">Online</span>
                                </div>
                            </div>
                            <div class="chat-actions">
                                <button class="chat-action-btn" title="Call">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                                    </svg>
                                </button>
                                <button class="chat-action-btn" title="Video">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polygon points="23 7 16 12 23 17 23 7"></polygon>
                                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                                    </svg>
                                </button>
                                <button class="chat-action-btn" title="Info">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <line x1="12" y1="16" x2="12" y2="12"></line>
                                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Message List -->
                        <div class="message-list">
                            <!-- Messages will be rendered here -->
                        </div>

                        <!-- Chat Footer -->
                        <div class="chat-footer">
                            <div class="chat-input-wrapper">
                                <button class="chat-footer-btn" title="Attach">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                                    </svg>
                                </button>
                                <input type="text" class="chat-input" placeholder="Type a message...">
                                <button class="chat-footer-btn" title="Emoji">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                                        <line x1="9" y1="9" x2="9.01" y2="9"></line>
                                        <line x1="15" y1="9" x2="15.01" y2="9"></line>
                                    </svg>
                                </button>
                                <button class="chat-footer-btn btn-send" title="Send">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Footer Placeholder -->
            <div id="comp-footer"></div>
        </div>
    </main>

    <!-- Supabase & DB Layer -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/theme.js"></script>
    <script>
        // Inbox UI Controller
        const InboxUI = {
            activeConnId: null,
            conversations: [],
            messages: [],
            pollInterval: null,

            async init() {
                console.log('InboxUI: Initializing...');
                
                // 1. Load sidebar components
                await ComponentLoader.loadAll([
                    { id: 'comp-sidebar', path: '../components/sidebar.html' },
                    { id: 'comp-header', path: '../components/header.html' },
                    { id: 'comp-footer', path: '../components/footer.html' }
                ]);

                // 2. Wait for Auth
                if (window.AumageDB) {
                    window.AumageDB.init();
                    await window.AumageDB.requireAuth();
                }

                // 3. Set active nav item
                const navInbox = document.getElementById('nav-inbox');
                if (navInbox) navInbox.classList.add('nav-item--active');

                // 4. Initial Load
                await this.loadConversations();

                // 5. Bind Send Event
                const chatForm = document.querySelector('.chat-footer');
                const chatInput = document.querySelector('.chat-input');
                const sendBtn = document.querySelector('.btn-send');

                const handleSend = async () => {
                    const content = chatInput.value.trim();
                    if (!content || !this.activeConnId) return;

                    chatInput.value = '';
                    const msg = await window.AumageDB.sendMessage(this.activeConnId, content);
                    if (msg) {
                        this.messages.push(msg);
                        this.renderMessages();
                        this.scrollToBottom();
                        // Update last message in sidebar
                        this.loadConversations();
                    }
                };

                sendBtn.onclick = handleSend;
                chatInput.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };

                // 6. Polling (every 5 seconds)
                setInterval(() => this.poll(), 5000);
            },

            async loadConversations() {
                this.conversations = await window.AumageDB.getConversations();
                this.renderConversations();
            },

            renderConversations() {
                const list = document.querySelector('.conversation-list');
                if (!list) return;

                if (this.conversations.length === 0) {
                    list.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-muted);">No conversations yet. Connect with others to start chatting!</div>';
                    return;
                }

                list.innerHTML = this.conversations.map(c => {
                    const other = c.otherUser || { display_name: 'Unknown User' };
                    const avatar = other.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(other.display_name)}&background=random`;
                    const lastMsg = c.lastMessage?.content || 'No messages yet';
                    const time = c.lastMessage ? this.formatTime(c.lastMessage.created_at) : '';
                    const isActive = c.id === this.activeConnId;

                    return `
                        <div class="conversation-item ${isActive ? 'conversation-item--active' : ''}" onclick="InboxUI.selectConversation('${c.id}')">
                            <div class="conversation-item__avatar">
                                <img src="${avatar}" alt="${other.display_name}">
                                <span class="status-indicator status-indicator--online"></span>
                            </div>
                            <div class="conversation-item__content">
                                <div class="conversation-item__top">
                                    <span class="conversation-item__name">${other.display_name}</span>
                                    <span class="conversation-item__time">${time}</span>
                                </div>
                                <div class="conversation-item__preview">
                                    <span>${lastMsg}</span>
                                    ${c.unreadCount > 0 ? `<span class="unread-badge">${c.unreadCount}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            },

            async selectConversation(connId) {
                if (this.activeConnId === connId) return;
                this.activeConnId = connId;

                // Show chat area, hide empty state
                document.querySelector('.chat-empty-state').style.display = 'none';
                document.querySelector('.chat-main').style.display = 'flex';

                // Update UI selection
                this.renderConversations();

                // Load Header Info
                const conn = this.conversations.find(c => c.id === connId);
                if (conn) {
                    const other = conn.otherUser;
                    document.querySelector('.chat-user-name').textContent = other.display_name;
                    document.querySelector('.chat-user-avatar').src = other.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(other.display_name)}&background=random`;
                }

                // Show loading in chat
                document.querySelector('.message-list').innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-muted);">Loading messages...</div>';

                // Mark as read
                await window.AumageDB.markMessagesAsRead(connId);
                
                // Fetch Messages
                this.messages = await window.AumageDB.getMessages(connId);
                this.renderMessages();
                this.scrollToBottom();
            },

            renderMessages() {
                const list = document.querySelector('.message-list');
                if (!list) return;

                if (this.messages.length === 0) {
                    list.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-muted);">Start of your conversation. Say hi!</div>';
                    return;
                }

                list.innerHTML = this.messages.map(m => {
                    const isSent = m.sender_id === window.AumageDB.user.id;
                    const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    return `
                        <div class="message-group ${isSent ? 'message-group--sent' : 'message-group--received'}">
                            <div class="message-bubble">
                                ${m.content}
                            </div>
                            <span class="message-time">${time}</span>
                        </div>
                    `;
                }).join('');
            },

            async poll() {
                if (!this.activeConnId) {
                    // Just poll for conversation list updates (new unread messages)
                    await this.loadConversations();
                    return;
                }

                // Poll for new messages in active chat
                const newMessages = await window.AumageDB.getMessages(this.activeConnId);
                if (newMessages.length > this.messages.length) {
                    this.messages = newMessages;
                    this.renderMessages();
                    this.scrollToBottom();
                    // Also mark as read
                    await window.AumageDB.markMessagesAsRead(this.activeConnId);
                }

                // Update sidebar for unread counts
                await this.loadConversations();
            },

            scrollToBottom() {
                const list = document.querySelector('.message-list');
                if (list) {
                    list.scrollTop = list.scrollHeight;
                }
            },

            formatTime(dateStr) {
                const date = new Date(dateStr);
                const now = new Date();
                const isToday = date.toDateString() === now.toDateString();
                if (isToday) {
                    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
                return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
            }
        };

        document.addEventListener('DOMContentLoaded', () => InboxUI.init());
    </script>
</body>

</html>
