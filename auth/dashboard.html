<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — HoHeTo Kyle</title>
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body class="dashboard-body">

    <!-- ══ Sidebar Placeholder ══ -->
    <div id="comp-sidebar"></div>

    <!-- ══ Main Content Area ══ -->
    <main class="main-area">

        <!-- Top Navigation Bar Placeholder -->
        <div id="comp-header"></div>

        <!-- Dynamic Content View -->
        <div class="content-view">

            <!-- Welcome Header -->
            <div class="welcome-section">
                <h1 class="welcome-title">Welcome back, <span id="dash-greeting-name">Storyteller</span> 👋</h1>
                <p class="welcome-subtitle">Turn sound, images, or video into creatures.</p>
            </div>

            <!-- Who's This For? -->
            <section class="dashboard-section">
                <div class="section-header">
                    <h3 class="section-title">Who's This For?</h3>
                </div>
                <div class="categories-grid">
                    <!-- Standard (Default - All Ages) -->
                    <div class="category-card">
                        <div class="category-card__img" style="color: #08D2C1;">
                            <img src="../img/dash_3.png" alt="Standard">
                        </div>
                        <div class="category-card__info">
                            <span class="category-card__title">Standard</span>
                            <span class="category-card__desc">Default - All Ages</span>
                        </div>
                    </div>
                    <!-- Tween (Age 9-12, Fun Names) -->
                    <div class="category-card">
                        <div class="category-card__img" style="color: #4ade80;">
                            <img src="../img/dash_2.png" alt="Tween">
                        </div>
                        <div class="category-card__info">
                            <span class="category-card__title">Tween</span>
                            <span class="category-card__desc">Age 9-12, Fun Names</span>
                        </div>
                    </div>
                    <!-- Kids (Age 5-8, Friendly & Cute) -->
                    <div class="category-card">
                        <div class="category-card__img" style="color: #60a5fa;">
                            <img src="../img/dash_1.png" alt="Kids">
                        </div>
                        <div class="category-card__info">
                            <span class="category-card__title">Kids</span>
                            <span class="category-card__desc">Age 5-8, Friendly & Cute</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Trending Creatures -->
            <section class="dashboard-section">
                <div class="section-header">
                    <h3 class="section-title">Our Trending Creatures Cards</h3>
                    <a href="#" class="btn-see-all">See all</a>
                </div>
                <div class="creatures-grid">
                    <!-- Glimmerwisp -->
                    <div class="creature-card--tall">
                        <img src="../img/card1.png" alt="Glimmerwisp">
                    </div>
                    <!-- Flamecurl -->
                    <div class="creature-card--tall">
                        <img src="../img/card5.png" alt="Flamecurl">
                    </div>
                    <!-- Gloomseraph -->
                    <div class="creature-card--tall">
                        <img src="../img/card4.png" alt="Gloomseraph">
                    </div>
                    <!-- Gloomfizz -->
                    <div class="creature-card--tall">
                        <img src="../img/card3.png" alt="Gloomfizz">
                    </div>
                    <!-- Frostclaw -->
                    <div class="creature-card--tall">
                        <img src="../img/card2.png" alt="Frostclaw">
                    </div>
                </div>
            </section>

            <!-- Popular Characters Rounded Squares -->
            <section class="dashboard-section">
                <div class="section-header">
                    <h3 class="section-title">Our Popular Characters</h3>
                    <a href="#" class="btn-see-all">See all</a>
                </div>
                <div class="creatures-grid">
                    <!-- Jellyfish -->
                    <div class="creature-card--rounded">
                        <img src="../img/creature5.png" alt="Jellyfish">
                    </div>
                    <!-- Oxidian -->
                    <div class="creature-card--rounded">
                        <img src="../img/creature4.png" alt="Oxidian">
                    </div>
                    <!-- Monkpet -->
                    <div class="creature-card--rounded">
                        <img src="../img/creature3.png" alt="Monkpet">
                    </div>
                    <!-- Lizard -->
                    <div class="creature-card--rounded">
                        <img src="../img/creature2.png" alt="Lizard">
                    </div>
                    <!-- Bearded -->
                    <div class="creature-card--rounded">
                        <img src="../img/creature1.png" alt="Bearded">
                    </div>
                </div>
            </section>

            <!-- Footer Placeholder -->
            <div id="comp-footer"></div>

        </div>
    </main>

    <!-- Supabase & DB Layer -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script src="../js/components.js"></script>
    <script>
        // Init Components & Functionalities
        document.addEventListener('DOMContentLoaded', async () => {
            // Load Components
            await ComponentLoader.loadAll([
                { id: 'comp-sidebar', path: '../components/sidebar.html' },
                { id: 'comp-header', path: '../components/header.html' },
                { id: 'comp-footer', path: '../components/footer.html' }
            ]);

            // Set active nav item
            const navDash = document.getElementById('nav-dashboard');
            if (navDash) navDash.classList.add('nav-item--active');

            // Database & Auth Initialization
            if (window.AumageDB) {
                window.AumageDB.init();

                const originalUpdateUI = window.AumageDB.updateAuthUI;
                window.AumageDB.updateAuthUI = function () {
                    originalUpdateUI.call(this);

                    const user = this.user;
                    if (user) {
                        const name = user.email?.split('@')[0] || 'Storyteller';
                        // Elements might be newly injected, so we select them again
                        const profName = document.getElementById('prof-name');
                        const greetName = document.getElementById('dash-greeting-name');
                        if (profName) profName.textContent = name;
                        if (greetName) greetName.textContent = name;
                    } else {
                        window.location.href = '../pages/login.html';
                    }
                };
            }

            // --- Sidebar & Profile UI ---
            const profileToggle = document.getElementById('profileToggle');
            const profileDropup = document.getElementById('profileDropup');

            if (profileToggle && profileDropup) {
                profileToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    profileDropup.classList.toggle('profile-dropup--active');
                });

                document.addEventListener('click', () => {
                    profileDropup.classList.remove('profile-dropup--active');
                });

                profileDropup.addEventListener('click', (e) => {
                    e.stopPropagation();
                });
            }

            // --- Theme Toggle Logic ---
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;

            if (themeToggle) {
                const updateThemeIcon = (theme) => {
                    const icon = themeToggle.querySelector('svg');
                    if (!icon) return;
                    if (theme === 'light') {
                        icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
                    } else {
                        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
                    }
                };

                // Initialize theme
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'light') {
                    body.classList.add('light-mode');
                    updateThemeIcon('light');
                }

                themeToggle.addEventListener('click', () => {
                    const isLight = body.classList.toggle('light-mode');
                    const newTheme = isLight ? 'light' : 'dark';
                    localStorage.setItem('theme', newTheme);
                    updateThemeIcon(newTheme);
                });
            }
        });
    </script>
</body>

</html>
