<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonance Clash — Stadium</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/battle.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>

    <div class="battle-container">
        <!-- Stage Area -->
        <main class="battle-arena">
            <div class="arena-background"></div>

            <!-- Opponent Side -->
            <div class="status-panel status-panel--opponent" id="status-opp">
                <div class="status-header">
                    <span class="status-name" id="opp-display-name">Opponent</span>
                    <span class="status-level" id="opp-level-text">Lv. --</span>
                </div>
                <div class="hp-bar-container">
                    <div id="opp-hp-fill" class="hp-bar-fill"></div>
                </div>
                <div class="status-wins">WINS: <span id="opp-wins-count">0</span></div>
            </div>

            <div class="platform platform--opponent">
                <div id="opp-creature" class="creature-card hidden">
                    <div class="card-inner">
                        <div class="card-front" id="opp-card-img"></div>
                        <div class="card-back"></div>
                    </div>
                </div>
            </div>

            <!-- Player Side -->
            <div class="status-panel status-panel--player" id="status-player">
                <div class="status-header">
                    <span class="status-name" id="player-display-name">Me</span>
                    <span class="status-level" id="player-level-text">Lv. --</span>
                </div>
                <div class="hp-bar-container">
                    <div id="player-hp-fill" class="hp-bar-fill"></div>
                </div>
                <div class="status-wins">WINS: <span id="player-wins-count">0</span></div>
            </div>

            <div class="platform platform--player">
                <div id="player-creature" class="creature-card hidden creature-card--active">
                    <div class="card-inner">
                        <div class="card-front" id="player-card-img"></div>
                        <div class="card-back"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Command Area -->
        <footer class="battle-footer">
            <div class="command-grid">
                <button class="btn-command btn-command--active" id="btn-reveal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                    </svg>
                    REVEAL CARD
                </button>
                <button class="btn-command" disabled>
                    SKILL (LOCKED)
                </button>
                <button class="btn-command" disabled>
                    SWAP (AUTO)
                </button>
                <button class="btn-command" onclick="window.location.href='dashboard.html'">
                    FORFEIT
                </button>
            </div>

            <div class="battle-log" id="battle-log">
                Synchronizing resonance frequencies...
            </div>

            <div class="team-preview" id="team-preview">
                <div class="team-slot" id="slot-0"></div>
                <div class="team-slot" id="slot-1"></div>
                <div class="team-slot" id="slot-2"></div>
            </div>
        </footer>

        <!-- Result Overlay -->
        <div id="result-overlay" class="result-overlay">
            <h1 id="result-title" class="result-title">VICTORY</h1>
            <p id="result-xp" class="result-xp">+100 Resonance XP</p>
            <button onclick="window.location.href='dashboard.html'" class="btn-clash" style="margin-top: 20px;">CONTINUE</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const opponentId = params.get('opponent');
            const battleId = params.get('id');

            if (window.AumageDB) {
                window.AumageDB.init();
                await window.AumageDB.requireAuth();
            }

            if (!opponentId && !battleId) {
                window.location.href = 'dashboard.html';
                return;
            }

            // Data State
            let mySquad = [];
            let oppSquad = [];
            let myWins = 0;
            let oppWins = 0;
            let currentRound = 0;
            let isPlayerA = false;
            let battleData = null;
            let roundActive = false;
            let pollTimer = null;

            async function initBattle() {
                let myTeamIds = [];
                let oppTeamIds = [];

                if (battleId) {
                    battleData = await window.AumageDB.getBattleStatus(battleId);
                    if (!battleData) return;

                    isPlayerA = battleData.player_a_id === window.AumageDB.user.id;
                    const oppUser = isPlayerA ? battleData.player_b : battleData.player_a;
                    const myUser = isPlayerA ? battleData.player_a : battleData.player_b;

                    // Fetch teams
                    const { data: teamA } = await window.AumageDB.supabase.from('teams').select('creature_ids').eq('id', battleData.player_a_team_id).single();
                    const { data: teamB } = await window.AumageDB.supabase.from('teams').select('creature_ids').eq('id', battleData.player_b_team_id).single();

                    myTeamIds = isPlayerA ? teamA.creature_ids : teamB.creature_ids;
                    oppTeamIds = isPlayerA ? teamB.creature_ids : teamA.creature_ids;

                    // UI Updates
                    document.getElementById('player-display-name').textContent = myUser?.display_name || 'Me';
                    document.getElementById('opp-display-name').textContent = oppUser?.display_name || 'Opponent';
                    
                    startMovePolling();
                } else {
                    // Bot Challenge
                    const myTeam = await window.AumageDB.getTeam();
                    myTeamIds = myTeam?.creature_ids || [];

                    const { data: oppTeam } = await window.AumageDB.supabase.from('teams').select('creature_ids').eq('user_id', opponentId).eq('is_active', true).single();
                    oppTeamIds = oppTeam?.creature_ids || [];

                    const { data: oppProfile } = await window.AumageDB.supabase.from('profiles').select('*').eq('id', opponentId).single();
                    document.getElementById('opp-display-name').textContent = oppProfile?.display_name || 'Aether Walker';
                    document.getElementById('player-display-name').textContent = window.AumageDB.user.user_metadata?.full_name || 'Me';
                }

                // Load Creatures
                mySquad = await Promise.all(myTeamIds.map(id => window.AumageDB.supabase.from('creatures').select('*').eq('id', id).single().then(r => r.data)));
                oppSquad = await Promise.all(oppTeamIds.map(id => window.AumageDB.supabase.from('creatures').select('*').eq('id', id).single().then(r => r.data)));

                // Populate team preview slots
                mySquad.forEach((c, i) => {
                    if (c) {
                        document.getElementById(`slot-${i}`).innerHTML = `<img src="${c.card_image_url || c.image_url}">`;
                    }
                });

                loadRound(0);
            }

            function loadRound(idx) {
                currentRound = idx;
                const log = document.getElementById('battle-log');
                log.textContent = `Round ${idx + 1}: Analyze your opponent and prepare to reveal.`;

                // Update Slots
                document.querySelectorAll('.team-slot').forEach((s, i) => s.classList.toggle('team-slot--active', i === idx));

                // Setup Active Creatures
                const pCreature = document.getElementById('player-creature');
                const oCreature = document.getElementById('opp-creature');

                pCreature.classList.add('hidden');
                oCreature.classList.add('hidden');
                pCreature.classList.remove('revealed');
                oCreature.classList.remove('revealed');

                setTimeout(() => {
                    const myC = mySquad[idx];
                    const opC = oppSquad[idx];

                    if (myC) {
                        document.getElementById('player-card-img').innerHTML = `<img src="${myC.card_image_url || myC.image_url}">`;
                        document.getElementById('player-level-text').textContent = `Lv. ${myC.tier || 1}`;
                    }
                    if (opC) {
                        document.getElementById('opp-card-img').innerHTML = `<img src="${opC.card_image_url || opC.image_url}">`;
                        document.getElementById('opp-level-text').textContent = `Lv. ${opC.tier || 1}`;
                    }

                    pCreature.classList.remove('hidden');
                    oCreature.classList.remove('hidden');
                    
                    document.getElementById('btn-reveal').disabled = false;
                }, 600);
            }

            async function handleReveal() {
                if (roundActive) return;
                
                const btn = document.getElementById('btn-reveal');
                btn.disabled = true;
                
                document.getElementById('player-creature').classList.add('revealed');
                document.getElementById('battle-log').textContent = "Waiting for resonance feedback...";

                if (battleId) {
                    await syncMove(currentRound);
                } else {
                    // Bot logic
                    roundActive = true;
                    setTimeout(async () => {
                        document.getElementById('opp-creature').classList.add('revealed');
                        await processRoundResult();
                        setTimeout(advanceRound, 3000);
                    }, 1200);
                }
            }

            async function syncMove(idx) {
                const log = battleData.battle_log || [
                    { a_rev: false, b_rev: false },
                    { a_rev: false, b_rev: false },
                    { a_rev: false, b_rev: false }
                ];
                if (isPlayerA) log[idx].a_rev = true;
                else log[idx].b_rev = true;

                await window.AumageDB.supabase.from('battles').update({ battle_log: log }).eq('id', battleId);
                battleData.battle_log = log;
            }

            function startMovePolling() {
                pollTimer = setInterval(async () => {
                    if (currentRound >= 3 || roundActive) return;

                    const { data } = await window.AumageDB.supabase.from('battles').select('*').eq('id', battleId).single();
                    if (!data) return;
                    
                    battleData = data;
                    const roundLog = (battleData.battle_log || [])[currentRound];
                    if (!roundLog) return;

                    // Update UI
                    const oppRevealed = isPlayerA ? roundLog.b_rev : roundLog.a_rev;
                    if (oppRevealed) {
                        document.getElementById('opp-creature').classList.add('revealed');
                    }

                    if (roundLog.a_rev && roundLog.b_rev && !roundActive) {
                        roundActive = true;
                        document.getElementById('battle-log').textContent = "Resonance Colliding!";
                        await processRoundResult();
                        setTimeout(advanceRound, 3000);
                    }
                }, 2000);
            }

            async function processRoundResult() {
                const myP = mySquad[currentRound]?.variant_tags?.power || 50;
                const opP = oppSquad[currentRound]?.variant_tags?.power || 50;

                const pCreature = document.getElementById('player-creature');
                const oCreature = document.getElementById('opp-creature');
                const log = document.getElementById('battle-log');

                pCreature.classList.add('clash-shake');
                oCreature.classList.add('clash-shake');

                if (myP > opP) {
                    log.textContent = "VICTORY! Your resonance overpowered the opponent.";
                    myWins++;
                    document.getElementById('opp-hp-fill').style.width = '0%';
                } else if (opP > myP) {
                    log.textContent = "DEFEAT! Opponent's resonance was too strong.";
                    oppWins++;
                    document.getElementById('player-hp-fill').style.width = '0%';
                } else {
                    log.textContent = "DRAW! The resonance frequencies canceled out.";
                }

                document.getElementById('player-wins-count').textContent = myWins;
                document.getElementById('opp-wins-count').textContent = oppWins;
            }

            function advanceRound() {
                roundActive = false;
                document.getElementById('player-hp-fill').style.width = '100%';
                document.getElementById('opp-hp-fill').style.width = '100%';

                if (currentRound < 2) {
                    loadRound(currentRound + 1);
                } else {
                    showFinalResult();
                }
            }

            function showFinalResult() {
                clearInterval(pollTimer);
                const overlay = document.getElementById('result-overlay');
                const title = document.getElementById('result-title');
                
                overlay.classList.add('result-overlay--show');
                if (myWins > oppWins) {
                    title.textContent = 'VICTORY';
                    title.style.color = 'var(--color-primary)';
                } else if (oppWins > myWins) {
                    title.textContent = 'DEFEAT';
                    title.style.color = '#ef4444';
                } else {
                    title.textContent = 'DRAW';
                }
            }

            document.getElementById('btn-reveal').onclick = handleReveal;

            await initBattle();
        });
    </script>
</body>

</html>
