<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonance Clash — Stadium</title>
    <link rel="stylesheet" href="../css/battle.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .team-slot { cursor: pointer; transition: transform 0.2s; }
        .team-slot:hover { transform: scale(1.1); }
        .team-slot--selected { border-color: #08d2c1 !important; box-shadow: 0 0 20px rgba(8, 210, 193, 0.6) !important; opacity: 1 !important; }
        .team-slot--used { opacity: 0.2 !important; pointer-events: none; filter: grayscale(1); }
    </style>
</head>

<body>

    <div class="battle-container">
        <!-- Stage Area -->
        <main class="battle-arena">
            <div class="arena-background"></div>

            <!-- Opponent Side -->
            <div class="status-panel status-panel--opponent" id="status-opp">
                <div class="status-avatar-wrap">
                    <img src="../img/avatar_placeholder.png" id="opp-avatar-img" class="status-avatar">
                </div>
                <div class="status-content">
                    <div class="status-header">
                        <span class="status-name" id="opp-display-name">Opponent</span>
                        <span class="status-level" id="opp-level-text">Lv. --</span>
                    </div>
                    <div class="hp-bar-container">
                        <div id="opp-hp-fill" class="hp-bar-fill"></div>
                    </div>
                    <div class="status-wins">ELIMINATED: <span id="opp-elim-count">0</span>/3</div>
                </div>
            </div>


            <div class="platform platform--opponent">
                <div id="opp-creature" class="creature-card hidden">
                    <div class="card-inner">
                        <div class="card-front" id="opp-card-img"></div>
                        <div class="card-back"></div>
                    </div>
                </div>
            </div>

            <!-- Player Side -->
            <div class="status-panel status-panel--player" id="status-player">
                <div class="status-avatar-wrap">
                    <img src="../img/avatar_placeholder.png" id="player-avatar-img" class="status-avatar">
                </div>
                <div class="status-content">
                    <div class="status-header">
                        <span class="status-name" id="player-display-name">Me</span>
                        <span class="status-level" id="player-level-text">Lv. --</span>
                    </div>
                    <div class="hp-bar-container">
                        <div id="player-hp-fill" class="hp-bar-fill"></div>
                    </div>
                    <div class="status-wins">ELIMINATED: <span id="player-elim-count">0</span>/3</div>
                </div>
            </div>


            <div class="platform platform--player">
                <div id="player-creature" class="creature-card hidden creature-card--active">
                    <div class="card-inner">
                        <div class="card-front" id="player-card-img"></div>
                        <div class="card-back"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Command Area -->
        <footer class="battle-footer">
            <div class="command-grid">
                <button class="btn-command btn-command--active" id="btn-reveal">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                    </svg>
                    REVEAL CARD
                </button>
                <button class="btn-command" onclick="window.location.href='dashboard.html'">
                    FORFEIT
                </button>
            </div>

            <div class="team-preview" id="team-preview">
                <div class="team-slot" id="slot-0" onclick="selectCard(0)"></div>
                <div class="team-slot" id="slot-1" onclick="selectCard(1)"></div>
                <div class="team-slot" id="slot-2" onclick="selectCard(2)"></div>
            </div>
        </footer>

        <div class="battle-log" id="battle-log">
            Connecting to stadium...
        </div>

        <!-- Result Overlay -->
        <div id="result-overlay" class="result-overlay">
            <h1 id="result-title" class="result-title">VICTORY</h1>
            <p id="result-detail" style="margin-bottom: 20px; color: var(--color-primary);"></p>
            <button onclick="window.location.href='dashboard.html'" class="btn-command" style="padding: 15px 40px;">EXIT STADIUM</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script>
        // Global for onclick
        let selectCard;

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const battleId = params.get('id');

            if (window.AumageDB) {
                window.AumageDB.init();
                await window.AumageDB.requireAuth();
            }

            if (!battleId) {
                window.location.href = 'dashboard.html';
                return;
            }

            // Data State
            let mySquad = [];
            let oppSquad = [];
            let myEliminated = 0;
            let oppEliminated = 0;
            let currentRound = 0;
            let isPlayerA = false;
            let battleData = null;
            let turnActive = false;
            let pollTimer = null;
            let selectedCardIndex = -1;
            let usedIndices = new Set();

            selectCard = (idx) => {
                if (usedIndices.has(idx) || turnActive) return;
                
                const log = battleData.battle_log || [];
                const roundLog = log[currentRound] || {};
                const alreadyMoved = isPlayerA ? roundLog.a_idx !== undefined : roundLog.b_idx !== undefined;
                if (alreadyMoved) return;

                selectedCardIndex = idx;
                document.querySelectorAll('.team-slot').forEach((s, i) => {
                    s.classList.toggle('team-slot--selected', i === idx);
                });

                // Show preview on platform
                const myC = mySquad[idx];
                const pCreature = document.getElementById('player-creature');
                pCreature.classList.add('hidden');
                setTimeout(() => {
                    document.getElementById('player-card-img').innerHTML = `<img src="${myC.card_image_url || myC.image_url}">`;
                    document.getElementById('player-level-text').textContent = `Lv. ${myC.tier || 1}`;
                    pCreature.classList.remove('hidden');
                }, 300);
            };

            async function initBattle() {
                battleData = await window.AumageDB.getBattleStatus(battleId);
                if (!battleData) return;

                isPlayerA = battleData.player_a_id === window.AumageDB.user.id;
                
                const myUser = isPlayerA ? battleData.player_a : battleData.player_b;
                const oppUser = isPlayerA ? battleData.player_b : battleData.player_a;
                const myTeam = isPlayerA ? battleData.player_a_team : battleData.player_b_team;
                const oppTeam = isPlayerA ? battleData.player_b_team : battleData.player_a_team;

                mySquad = myTeam?.creatures || [];
                oppSquad = oppTeam?.creatures || [];

                // UI Setup
                document.getElementById('player-display-name').textContent = myUser?.display_name || 'Me';
                document.getElementById('player-avatar-img').src = myUser?.avatar_url || `https://ui-avatars.com/api/?name=Me&background=08D2C1&color=fff`;
                document.getElementById('opp-display-name').textContent = oppUser?.display_name || 'Opponent';
                document.getElementById('opp-avatar-img').src = oppUser?.avatar_url || `https://ui-avatars.com/api/?name=Opp&background=ff4b4b&color=fff`;

                // Populate team preview
                mySquad.forEach((c, i) => {
                    if (c && i < 3) {
                        document.getElementById(`slot-${i}`).innerHTML = `<img src="${c.card_image_url || c.image_url}">`;
                    }
                });

                loadRound(0);
                startTurnPolling();
            }

            function loadRound(idx) {
                if (idx >= 3) return;
                currentRound = idx;
                selectedCardIndex = -1;
                turnActive = false;

                // Sync used indices from log for previous rounds
                const log = battleData.battle_log || [];
                usedIndices.clear();
                log.slice(0, idx).forEach(r => {
                    usedIndices.add(isPlayerA ? r.a_idx : r.b_idx);
                });

                document.querySelectorAll('.team-slot').forEach((s, i) => {
                    s.classList.toggle('team-slot--used', usedIndices.has(i));
                    s.classList.remove('team-slot--selected');
                    s.classList.remove('team-slot--active');
                });

                const pCreature = document.getElementById('player-creature');
                const oCreature = document.getElementById('opp-creature');
                pCreature.classList.add('hidden');
                oCreature.classList.add('hidden');
                pCreature.classList.remove('revealed');
                oCreature.classList.remove('revealed');

                document.getElementById('battle-log').textContent = `Round ${idx + 1}: Select a card to reveal.`;
                updateTurnUI();
            }

            function updateTurnUI() {
                const log = battleData.battle_log || [];
                const roundLog = log[currentRound] || {};
                
                const myMove = isPlayerA ? roundLog.a_idx : roundLog.b_idx;
                const oppMove = isPlayerA ? roundLog.b_idx : roundLog.a_idx;

                const isMyTurn = (isPlayerA && myMove === undefined) || (!isPlayerA && log[currentRound]?.a_idx !== undefined && myMove === undefined);
                
                const btn = document.getElementById('btn-reveal');
                btn.disabled = !isMyTurn || selectedCardIndex === -1;

                if (isMyTurn) {
                    document.getElementById('battle-log').textContent = selectedCardIndex === -1 ? "Select a card from your squad!" : "Ready! Reveal your resonance.";
                } else {
                    document.getElementById('battle-log').textContent = "Waiting for opponent...";
                }

                // Visual reveals
                if (myMove !== undefined) {
                    document.getElementById('player-creature').classList.add('revealed');
                }
                if (oppMove !== undefined) {
                    const oppC = oppSquad[oppMove];
                    document.getElementById('opp-card-img').innerHTML = `<img src="${oppC.card_image_url || oppC.image_url}">`;
                    document.getElementById('opp-level-text').textContent = `Lv. ${oppC.tier || 1}`;
                    document.getElementById('opp-creature').classList.remove('hidden');
                    document.getElementById('opp-creature').classList.add('revealed');
                }
            }

            async function handleReveal() {
                if (selectedCardIndex === -1) return;
                
                const log = battleData.battle_log || [];
                if (!log[currentRound]) log[currentRound] = {};
                
                if (isPlayerA) log[currentRound].a_idx = selectedCardIndex;
                else log[currentRound].b_idx = selectedCardIndex;

                document.getElementById('player-creature').classList.add('revealed');
                document.getElementById('btn-reveal').disabled = true;
                usedIndices.add(selectedCardIndex);
                document.getElementById(`slot-${selectedCardIndex}`).classList.add('team-slot--used');

                await window.AumageDB.updateBattle(battleId, { battle_log: log });
            }

            function startTurnPolling() {
                pollTimer = setInterval(async () => {
                    const data = await window.AumageDB.getBattleStatus(battleId);
                    if (!data) return;
                    battleData = data;
                    
                    const roundLog = (battleData.battle_log || [])[currentRound];
                    if (!roundLog) return;

                    updateTurnUI();

                    if (roundLog.a_idx !== undefined && roundLog.b_idx !== undefined && !turnActive) {
                        turnActive = true;
                        await processClash();
                    }
                }, 2500);
            }

            async function processClash() {
                document.getElementById('battle-log').textContent = "Resonance Clash!";
                
                const roundLog = battleData.battle_log[currentRound];
                const myIdx = isPlayerA ? roundLog.a_idx : roundLog.b_idx;
                const opIdx = isPlayerA ? roundLog.b_idx : roundLog.a_idx;

                const myC = mySquad[myIdx];
                const opC = oppSquad[opIdx];
                
                const myP = myC?.variant_tags?.stats?.atk || 50;
                const opP = opC?.variant_tags?.stats?.atk || 50;

                setTimeout(() => {
                    if (myP > opP) {
                        oppEliminated++;
                        document.getElementById('opp-hp-fill').style.width = '0%';
                        document.getElementById('opp-elim-count').textContent = oppEliminated;
                        document.getElementById('battle-log').textContent = `${myC.name} eliminated ${opC.name}!`;
                    } else if (opP > myP) {
                        myEliminated++;
                        document.getElementById('player-hp-fill').style.width = '0%';
                        document.getElementById('player-elim-count').textContent = myEliminated;
                        document.getElementById('battle-log').textContent = `${opC.name} eliminated ${myC.name}!`;
                    } else {
                        document.getElementById('battle-log').textContent = "It's a draw! Both stand firm.";
                    }
                    
                    setTimeout(() => {
                        document.getElementById('player-hp-fill').style.width = '100%';
                        document.getElementById('opp-hp-fill').style.width = '100%';
                        if (currentRound < 2) loadRound(currentRound + 1);
                        else finishBattle();
                    }, 3000);
                }, 1500);
            }

            async function finishBattle() {
                clearInterval(pollTimer);
                const winnerId = oppEliminated > myEliminated ? window.AumageDB.user.id : (isPlayerA ? battleData.player_b_id : battleData.player_a_id);
                if (oppEliminated === myEliminated) {
                    // Tie logic could go here, but usually owner wins or random
                }

                await window.AumageDB.updateBattle(battleId, { 
                    status: 'completed', 
                    winner_id: winnerId 
                });

                const overlay = document.getElementById('result-overlay');
                const isWinner = winnerId === window.AumageDB.user.id;
                document.getElementById('result-title').textContent = isWinner ? 'VICTORY' : 'DEFEAT';
                document.getElementById('result-detail').textContent = isWinner 
                    ? `You eliminated ${oppEliminated} creatures!` 
                    : `Your squad was overwhelmed.`;
                overlay.classList.add('result-overlay--show');
            }

            document.getElementById('btn-reveal').onclick = handleReveal;
            initBattle();
        });
    </script>
</body>

</html>
