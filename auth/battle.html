<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonance Clash — HoHeTo Kyle</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/battle.css">
</head>

<body>

    <div class="battle-container">
        <!-- Environment Layer -->
        <div id="battle-env" class="battle-env env--storm"></div>

        <div class="battle-ui">
            <!-- Header: Players & Scores -->
            <header class="battle-header">
                <div class="player-info">
                    <img src="../img/avatar_placeholder.png" id="my-avatar" class="player-badge">
                    <div class="player-stats">
                        <span class="player-name" id="my-name">Me</span>
                        <span class="player-score">WINS: <span id="my-wins">0</span></span>
                    </div>
                </div>

                <div class="battle-status">
                    <div id="clash-round-text" style="font-size: 14px; letter-spacing: 2px; color: var(--color-primary);">ROUND 1 / 3</div>
                </div>

                <div class="player-info player-info--opponent">
                    <img src="../img/avatar_placeholder.png" id="opp-avatar" class="player-badge">
                    <div class="player-stats">
                        <span class="player-name" id="opp-name">Opponent</span>
                        <span class="player-score">WINS: <span id="opp-wins">0</span></span>
                    </div>
                </div>
            </header>

            <!-- Battlefield: 3 Lanes -->
            <div class="battlefield">
                <div class="lane" id="lane-0">
                    <div class="card-slot card-slot--opponent" id="opp-slot-0">
                        <div class="card-inner">
                            <div class="card-front" id="opp-front-0"></div>
                            <div class="card-back"></div>
                        </div>
                    </div>
                    <div class="clash-indicator" id="clash-0">VS</div>
                    <div class="card-slot card-slot--me" id="my-slot-0">
                        <div class="card-inner">
                            <div class="card-front" id="my-front-0"></div>
                            <div class="card-back"></div>
                        </div>
                    </div>
                </div>
                <div class="lane" id="lane-1">
                    <div class="card-slot card-slot--opponent" id="opp-slot-1">
                        <div class="card-inner">
                            <div class="card-front" id="opp-front-1"></div>
                            <div class="card-back"></div>
                        </div>
                    </div>
                    <div class="clash-indicator" id="clash-1">VS</div>
                    <div class="card-slot card-slot--me" id="my-slot-1">
                        <div class="card-inner">
                            <div class="card-front" id="my-front-1"></div>
                            <div class="card-back"></div>
                        </div>
                    </div>
                </div>
                <div class="lane" id="lane-2">
                    <div class="card-slot card-slot--opponent" id="opp-slot-2">
                        <div class="card-inner">
                            <div class="card-front" id="opp-front-2"></div>
                            <div class="card-back"></div>
                        </div>
                    </div>
                    <div class="clash-indicator" id="clash-2">VS</div>
                    <div class="card-slot card-slot--me" id="my-slot-2">
                        <div class="card-inner">
                            <div class="card-front" id="my-front-2"></div>
                            <div class="card-back"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer: Controls -->
            <footer class="battle-controls">
                <div id="battle-tip" style="color: var(--color-primary); font-size: 14px; margin-bottom: 10px; font-weight: 700;">CHOOSE A ROUND CARD TO REVEAL</div>
            </footer>
        </div>

        <!-- Result Overlay -->
        <div id="result-overlay" class="result-overlay">
            <h1 id="result-title" class="result-title">VICTORY</h1>
            <p id="result-xp" class="result-xp">+100 Resonance XP</p>
            <button onclick="window.location.href='dashboard.html'" class="btn-clash">Continue</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const opponentId = params.get('opponent');
            const battleId = params.get('id');

            if (window.AumageDB) {
                window.AumageDB.init();
                await window.AumageDB.requireAuth();
            }

            if (!opponentId && !battleId) {
                alert('No session or opponent specified!');
                window.location.href = 'dashboard.html';
                return;
            }

            // Set Random Environment
            const envs = ['env--storm', 'env--volcanic', 'env--ethereal'];
            const envEl = document.getElementById('battle-env');
            envEl.className = 'battle-env ' + envs[Math.floor(Math.random() * envs.length)];

            // Data State
            let mySquad = [];
            let oppSquad = [];
            let myWins = 0;
            let oppWins = 0;
            let currentRound = 0; // 0, 1, 2
            let isPlayerA = false;
            let battleData = null;
            let roundActive = false;

            // Load Squads
            async function initBattle() {
                let myTeamIds = [];
                let oppTeamIds = [];
                let oppUser = null;

                if (battleId) {
                    battleData = await window.AumageDB.getBattleStatus(battleId);
                    if (!battleData) return;

                    isPlayerA = battleData.player_a_id === window.AumageDB.user.id;
                    oppUser = isPlayerA ? battleData.player_b : battleData.player_a;

                    // Fetch teams
                    const { data: teamA } = await window.AumageDB.supabase.from('teams').select('creature_ids').eq('id', battleData.player_a_team_id).single();
                    const { data: teamB } = await window.AumageDB.supabase.from('teams').select('creature_ids').eq('id', battleData.player_b_team_id).single();

                    myTeamIds = isPlayerA ? teamA.creature_ids : teamB.creature_ids;
                    oppTeamIds = isPlayerA ? teamB.creature_ids : teamA.creature_ids;

                    // Set UI names/avatars
                    document.getElementById('opp-name').textContent = oppUser?.display_name || 'Opponent';
                    document.getElementById('opp-avatar').src = oppUser?.avatar_url || `https://ui-avatars.com/api/?name=${oppUser?.display_name || 'Opponent'}`;
                    
                    // Start polling for moves
                    startMovePolling();
                } else {
                    // Manual Challenge path (Simulated/Bot)
                    const myTeam = await window.AumageDB.getTeam();
                    myTeamIds = myTeam?.creature_ids || [];

                    const { data: oppTeam } = await window.AumageDB.supabase.from('teams').select('creature_ids').eq('user_id', opponentId).eq('is_active', true).single();
                    oppTeamIds = oppTeam?.creature_ids || [];

                    const { data: oppProfile } = await window.AumageDB.supabase.from('profiles').select('*').eq('id', opponentId).single();
                    document.getElementById('opp-name').textContent = oppProfile?.display_name || 'Opponent';
                    document.getElementById('opp-avatar').src = oppProfile?.avatar_url || `https://ui-avatars.com/api/?name=${oppProfile?.display_name}`;
                }

                // Load My Profile
                document.getElementById('my-name').textContent = window.AumageDB.user.user_metadata?.full_name || 'Me';
                document.getElementById('my-avatar').src = window.AumageDB.user.user_metadata?.avatar_url || '../img/avatar_placeholder.png';

                // Fetch all creature details
                mySquad = await Promise.all(myTeamIds.map(id => window.AumageDB.supabase.from('creatures').select('*').eq('id', id).single().then(r => r.data)));
                oppSquad = await Promise.all(oppTeamIds.map(id => window.AumageDB.supabase.from('creatures').select('*').eq('id', id).single().then(r => r.data)));

                // Populate slots
                for (let i = 0; i < 3; i++) {
                    if (mySquad[i]) {
                        document.getElementById(`my-front-${i}`).innerHTML = `<img src="${mySquad[i].card_image_url || mySquad[i].image_url}">`;
                        document.getElementById(`my-slot-${i}`).onclick = () => handleCardClick(i);
                    }
                    if (oppSquad[i]) {
                        document.getElementById(`opp-front-${i}`).innerHTML = `<img src="${oppSquad[i].card_image_url || oppSquad[i].image_url}">`;
                    }
                }

                updateRoundUI();
            }

            function updateRoundUI() {
                document.getElementById('clash-round-text').textContent = `ROUND ${currentRound + 1} / 3`;
                document.querySelectorAll('.lane').forEach((l, idx) => {
                    l.classList.toggle('lane--active', idx === currentRound);
                });
            }

            async function handleCardClick(roundIdx) {
                if (roundIdx !== currentRound || roundActive) return;

                // Mark current player as revealed locally
                document.getElementById(`my-slot-${roundIdx}`).classList.add('revealed');
                
                if (battleId) {
                    await syncMove(roundIdx);
                } else {
                    // Simulated Battle: Opponent reveals after a delay
                    roundActive = true;
                    setTimeout(async () => {
                        document.getElementById(`opp-slot-${roundIdx}`).classList.add('revealed');
                        await processRoundResult(roundIdx);
                        roundActive = false;
                        advanceRound();
                    }, 1000);
                }
            }

            async function syncMove(roundIdx) {
                const log = battleData.battle_log || [
                    { a_rev: false, b_rev: false },
                    { a_rev: false, b_rev: false },
                    { a_rev: false, b_rev: false }
                ];

                if (isPlayerA) log[roundIdx].a_rev = true;
                else log[roundIdx].b_rev = true;

                await window.AumageDB.supabase.from('battles').update({ battle_log: log }).eq('id', battleId);
                battleData.battle_log = log;
            }

            function startMovePolling() {
                setInterval(async () => {
                    if (currentRound >= 3 || roundActive) return;

                    const { data } = await window.AumageDB.supabase.from('battles').select('*').eq('id', battleId).single();
                    if (!data) return;
                    
                    battleData = data;
                    const log = battleData.battle_log || [];
                    const roundLog = log[currentRound];

                    if (!roundLog) return;

                    // Update UI based on log
                    if ((isPlayerA && roundLog.b_rev) || (!isPlayerA && roundLog.a_rev)) {
                        // Opponent revealed!
                        const oppSlot = document.getElementById(`opp-slot-${currentRound}`);
                        if (!oppSlot.classList.contains('revealed')) {
                            oppSlot.classList.add('revealed');
                        }
                    }

                    if (roundLog.a_rev && roundLog.b_rev && !roundActive) {
                        roundActive = true;
                        // Both revealed! Process result
                        await processRoundResult(currentRound);
                        setTimeout(() => {
                            roundActive = false;
                            advanceRound();
                        }, 2000);
                    }
                }, 2000);
            }

            async function processRoundResult(idx) {
                const myPower = mySquad[idx]?.variant_tags?.power || 50;
                const oppPower = oppSquad[idx]?.variant_tags?.power || 50;
                
                const indicator = document.getElementById(`clash-${idx}`);
                indicator.classList.add('clash-shake');

                if (myPower > oppPower) {
                    indicator.textContent = 'WIN';
                    indicator.style.color = 'var(--color-primary)';
                    myWins++;
                } else if (oppPower > myPower) {
                    indicator.textContent = 'LOSS';
                    indicator.style.color = '#ff4b4b';
                    oppWins++;
                } else {
                    indicator.textContent = 'DRAW';
                    indicator.style.color = '#fff';
                }

                document.getElementById('my-wins').textContent = myWins;
                document.getElementById('opp-wins').textContent = oppWins;
            }

            function advanceRound() {
                currentRound++;
                if (currentRound < 3) {
                    updateRoundUI();
                } else {
                    showFinalResult();
                }
            }

            function showFinalResult() {
                const overlay = document.getElementById('result-overlay');
                const title = document.getElementById('result-title');
                const xp = document.getElementById('result-xp');

                overlay.classList.add('result-overlay--show');

                if (myWins > oppWins) {
                    title.textContent = 'VICTORY';
                    title.style.color = 'var(--color-primary)';
                    xp.textContent = '+150 Resonance XP';
                } else if (oppWins > myWins) {
                    title.textContent = 'DEFEAT';
                    title.style.color = '#ff4b4b';
                    xp.textContent = '+25 Resilience XP';
                } else {
                    title.textContent = 'DRAW';
                    title.style.color = '#fff';
                    xp.textContent = '+50 Harmony XP';
                }
            }

            await initBattle();
        });
    </script>
</body>


</html>
