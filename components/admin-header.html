<header class="top-bar">
    <div class="hud-line" style="position: absolute; top: 0; left: 0; width: 100%; height: 1px; background: linear-gradient(90deg, var(--color-admin), transparent);"></div>
    <h2 class="top-bar__title">Admin <span style="font-weight: 400; opacity: 0.6;">v1.0</span></h2>

    <div class="top-bar__search">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" class="search-input" id="admin-search" placeholder="SYSTEM SEARCH [USER_ID / ENTITY]...">
    </div>

    <div class="top-bar__actions">
        <div class="stat-pill" title="Server Time" style="font-family: monospace; letter-spacing: 1px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span id="admin-header-time">00:00:00</span>
        </div>
        
        <div class="system-badge">
            <span class="dot"></span>
            SYS_OPERATIONAL
        </div>
    </div>
</header>
