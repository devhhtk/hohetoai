<header class="top-bar">
    <h2 class="top-bar__title">Admin Control Panel</h2>

    <div class="top-bar__search">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" class="search-input" id="admin-search" placeholder="Search Users or IDs...">
    </div>

    <div class="top-bar__actions">
        <div class="stat-pill" title="Server Time">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span id="admin-header-time">00:00:00</span>
        </div>
        
        <button class="action-btn" id="adminThemeToggle" title="Toggle Theme">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>

        <div class="system-badge system-badge--online">
            <span class="dot"></span>
            SYSTEM ONLINE
        </div>
    </div>
</header>
