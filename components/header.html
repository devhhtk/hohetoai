<input type="checkbox" id="streakModalToggle" class="streak-modal-toggle" hidden>
<input type="checkbox" id="levelUpModalToggle" class="level-up-modal-toggle" hidden>

<header class="top-bar">
    <h2 class="top-bar__title">Dashboard</h2>

    <div class="top-bar__search">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" class="search-input" placeholder="Search Here">
    </div>

    <div class="top-bar__actions">
        <label for="streakModalToggle" class="action-btn streak-btn" title="Daily Streak">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3 2.5.5 4.5 2.5 4.5 5.5a4.5 4.5 0 0 1-9 0c0-1.11.33-2.11 1-3 .5 1.11 1 2 3.5 3z"></path>
                <path d="M12 2c0 2-3 4.5-3 8.5h6c0-4-3-6.5-3-8.5z"></path>
            </svg>
            <span class="streak-count">7</span>
        </label>
        <button class="action-btn" id="themeToggle" title="Toggle Theme">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
        <button class="action-btn" title="Notifications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="badge--dot"></span>
        </button>
        <button class="btn-create" onclick="window.location.href='create-creature.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Create Creature
        </button>
    </div>
</header>

<!-- Daily Streak Modal Overlay -->
<div class="streak-modal-overlay">
    <div class="streak-modal">
        <div class="streak-modal__header">
            <h3>Monthly Streak Rewards</h3>
            <label for="streakModalToggle" class="close-modal">&times;</label>
        </div>
        <div class="streak-modal__content">
            <div class="streak-grid" id="streakGrid">
                <!-- Populated dynamically by JS -->
                <div class="streak-loading">Loading rewards...</div>
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * Streak System Controller
     */
    const StreakUI = {
        async init() {
            const grid = document.getElementById('streakGrid');
            if (!grid) return;

            // 1. Fetch status from API
            const status = await window.AumageDB.getStreakStatus();
            if (!status || !status.success) {
                grid.innerHTML = '<p class="error-msg">Failed to load streak status.</p>';
                return;
            }

            const { streak_count, last_reward_index, rewards } = status;

            // 2. Update Header Counter
            const countEl = document.querySelector('.streak-count');
            if (countEl) countEl.textContent = streak_count;

            // 3. Populate Grid
            grid.innerHTML = '';
            
            for (let day = 1; day <= 30; day++) {
                const xp = rewards[day] || 0;
                const isClaimed = day <= last_reward_index;
                const isAvailable = day === (last_reward_index + 1) && day <= streak_count;
                
                const item = document.createElement('div');
                item.className = 'streak-item';
                if (isClaimed) item.classList.add('streak-item--claimed');
                if (isAvailable) item.classList.add('streak-item--active');

                // Special styling for Day 30
                if (day === 30) {
                    item.style.borderColor = '#ffd700';
                    if (!isClaimed) item.style.background = 'rgba(255, 215, 0, 0.05)';
                }

                item.innerHTML = `
                    <span class="streak-day" ${day === 30 ? 'style="color: #ffd700;"' : ''}>Day ${day}</span>
                    <div class="streak-icon" ${day === 30 && !isClaimed ? 'style="color: #ffd700;"' : ''}>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                    </div>
                    <span class="streak-reward">${xp} XP</span>
                `;

                if (isAvailable) {
                    item.style.cursor = 'pointer';
                    item.title = 'Click to Claim Day ' + day + '!';
                    item.onclick = (e) => {
                        e.preventDefault();
                        this.claim(day);
                    };
                }

                grid.appendChild(item);
            }
        },

        async claim(day) {
            try {
                // Disable clicking while processing
                const grid = document.getElementById('streakGrid');
                grid.style.pointerEvents = 'none';
                grid.style.opacity = '0.7';

                const result = await window.AumageDB.claimStreakReward();
                
                if (result.success) {
                    console.log('Reward claimed!', result);
                    
                    // Refresh UI
                    await this.init();
                    
                    // Update main sidebar stats
                    if (window.AumageDB.updateSidebarStats) {
                        window.AumageDB.updateSidebarStats();
                    }

                    // Level Up Modal
                    if (result.leveledUp) {
                        document.getElementById('lvl-old').textContent = result.profile.level - 1;
                        document.getElementById('lvl-new').textContent = result.profile.level;
                        document.getElementById('levelUpModalToggle').checked = true;
                    }
                }
            } catch (err) {
                console.error('Claim error:', err);
                alert(err.message || 'Failed to claim reward');
            } finally {
                const grid = document.getElementById('streakGrid');
                if (grid) {
                    grid.style.pointerEvents = 'auto';
                    grid.style.opacity = '1';
                }
            }
        }
    };

    // Initialize when modal is likely to be viewed
    document.addEventListener('DOMContentLoaded', () => {
        // Wait for AumageDB to be ready
        const checkDB = setInterval(() => {
            if (window.AumageDB && window.AumageDB.user) {
                clearInterval(checkDB);
                StreakUI.init();
            }
        }, 500);

        // Also refresh on manual modal open
        document.getElementById('streakModalToggle')?.addEventListener('change', (e) => {
            if (e.target.checked) StreakUI.init();
        });
    });
</script>
<div class="level-up-modal-overlay">
    <div class="level-up-modal">
        <div class="level-up-aura"></div>
        <div class="level-up-content">
            <div class="level-up-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                </svg>
            </div>
            <h2 class="level-up-title">LEVEL UP!</h2>
            <div class="level-up-display">
                <span class="old-level" id="lvl-old">1</span>
                <svg class="level-arrow" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                <span class="new-level" id="lvl-new">2</span>
            </div>
            <p class="level-up-msg">You've reached a new tier of mastery!</p>
            <button class="btn-level-up-claim" onclick="document.getElementById('levelUpModalToggle').checked = false">
                CONTINUE JOURNEY
            </button>
        </div>
    </div>
</div>
