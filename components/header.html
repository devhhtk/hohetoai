<input type="checkbox" id="streakModalToggle" class="streak-modal-toggle" hidden>
<input type="checkbox" id="levelUpModalToggle" class="level-up-modal-toggle" hidden>

<header class="top-bar">
    <h2 class="top-bar__title">Dashboard</h2>

    <div class="top-bar__search">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" class="search-input" placeholder="Search Here">
    </div>

    <div class="top-bar__actions">
        <label for="streakModalToggle" class="action-btn streak-btn" title="Daily Streak">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3 2.5.5 4.5 2.5 4.5 5.5a4.5 4.5 0 0 1-9 0c0-1.11.33-2.11 1-3 .5 1.11 1 2 3.5 3z"></path>
                <path d="M12 2c0 2-3 4.5-3 8.5h6c0-4-3-6.5-3-8.5z"></path>
            </svg>
            <span class="streak-count">7</span>
        </label>
        <button class="action-btn" id="themeToggle" title="Toggle Theme">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
        <button class="action-btn" title="Notifications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="badge--dot"></span>
        </button>
        <button class="btn-create" onclick="window.location.href='create-creature.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Create Creature
        </button>
    </div>
</header>

<!-- Daily Streak Modal Overlay -->
<div class="streak-modal-overlay">
    <div class="streak-modal" id="streakModal">
        <div class="streak-modal__header">
            <h3>Monthly Streak Rewards</h3>
            <label for="streakModalToggle" class="close-modal">&times;</label>
        </div>
        <div class="streak-modal__content">
            <div class="streak-grid" id="streakGrid">
                <!-- Populated dynamically by JS -->
                <div class="streak-loading">Loading rewards...</div>
            </div>
        </div>
    </div>
</div>

<!-- Level Up Modal Overlay -->
<div class="level-up-modal-overlay">
    <canvas id="levelUpCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;"></canvas>
    <div class="level-up-modal">
        <div class="level-up-aura"></div>
        <div class="level-up-content">
            <div class="level-up-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                </svg>
            </div>
            <h2 class="level-up-title">LEVEL UP!</h2>
            <div class="level-up-display">
                <span class="old-level" id="lvl-old">1</span>
                <svg class="level-arrow" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                <span class="new-level" id="lvl-new">2</span>
            </div>
            <p class="level-up-msg">You've reached a new tier of mastery!</p>
            <button class="btn-level-up-claim" onclick="document.getElementById('levelUpModalToggle').checked = false">
                CONTINUE JOURNEY
            </button>
        </div>
    </div>
</div>
