<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — HoHeTo Kyle</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/register.css" />
</head>

<body>
    <div class="login-page">
        <!-- ══ Left: Artwork ══ -->
        <div class="login-artwork">
            <img src="../img/register-hero.png" alt="HoHeTo Kai Celestial Guardian" class="login-artwork__image" />
            <div class="login-artwork__edge"></div>
        </div>

        <!-- ══ Right: Form ══ -->
        <div class="login-form-panel">
            <div class="login-form-container">
                <h1 class="login-heading">WELCOME</h1>
                <p class="login-subheading">Register your data</p>

                <form id="registerForm" novalidate>
                    <!-- Full Name -->
                    <div class="form-group">
                        <span class="form-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg" style="opacity: 0.6;">
                                <path
                                    d="M4 22C4 17.5817 7.58172 14 12 14C16.4183 14 20 17.5817 20 22H18C18 18.6863 15.3137 16 12 16C8.68629 16 6 18.6863 6 22H4ZM12 13C8.685 13 6 10.315 6 7C6 3.685 8.685 1 12 1C15.315 1 18 3.685 18 7C18 10.315 15.315 13 12 13ZM12 11C14.21 11 16 9.21 16 7C16 4.79 14.21 3 12 3C9.79 3 8 4.79 8 7C8 9.21 9.79 11 12 11Z"
                                    fill="white" />
                            </svg>
                        </span>
                        <input type="text" id="fullname" class="form-input" placeholder="Kyle Iberways"
                            autocomplete="name" />
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <span class="form-icon">
                            <img src="../img/icon-mail.svg" width="18" height="16" alt="" style="opacity: 0.6;" />
                        </span>
                        <input type="email" id="email" class="form-input" placeholder="iberways@gmail.com"
                            autocomplete="email" />
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <span class="form-icon">
                            <img src="../img/icon-lock.svg" width="18" height="18" alt="" style="opacity: 0.6;" />
                        </span>
                        <input type="password" id="password" class="form-input" placeholder="••••••••••"
                            autocomplete="new-password" />
                        <button type="button" class="form-toggle-password" aria-label="Toggle password"
                            data-target="password">
                            <span class="icon-eye" style="display: flex;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </span>
                            <span class="icon-eye-off" style="display: none;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                                    <line x1="1" y1="1" x2="23" y2="23" />
                                </svg>
                            </span>
                        </button>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <span class="form-icon">
                            <img src="../img/icon-lock.svg" width="18" height="18" alt="" style="opacity: 0.6;" />
                        </span>
                        <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••••"
                            autocomplete="new-password" />
                        <button type="button" class="form-toggle-password" aria-label="Toggle confirm password"
                            data-target="confirmPassword">
                            <span class="icon-eye" style="display: flex;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </span>
                            <span class="icon-eye-off" style="display: none;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                                    <line x1="1" y1="1" x2="23" y2="23" />
                                </svg>
                            </span>
                        </button>
                    </div>

                    <!-- Register Button -->
                    <button type="submit" class="btn-login">Register</button>
                </form>

                <!-- Divider -->
                <div class="divider"><span>OR</span></div>

                <!-- Social Buttons -->
                <div class="social-buttons">
                    <!-- Google -->
                    <button class="btn-social" type="button" aria-label="Continue with Google">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                        </svg>
                    </button>
                    <!-- Apple -->
                    <button class="btn-social" type="button" aria-label="Continue with Apple">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#ffffff">
                            <path
                                d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
                        </svg>
                    </button>
                </div>

                <!-- Login link -->
                <p class="register-prompt">
                    Already Have an Account? <a href="./login.html">Login</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script src="../js/register.js"></script>
</body>

</html>
