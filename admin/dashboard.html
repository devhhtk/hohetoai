<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — HoHeTo Kai</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

    <!-- Decorative Cyber Elements -->
    <div class="cyber-scanner"></div>

    <!-- Sidebar Placeholder -->
    <div id="comp-admin-sidebar"></div>

    <main class="main-area">
        <!-- Top Bar Placeholder -->
        <div id="comp-admin-header"></div>

        <div class="content-view">
            <!-- Welcome Header -->
            <div class="admin-welcome" style="margin-bottom: 40px; position: relative;">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div style="width: 4px; height: 40px; background: var(--color-admin); box-shadow: 0 0 15px var(--color-admin-glow);"></div>
                    <div>
                        <h1 style="font-family: 'Exo 2', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -0.5px; text-transform: uppercase;">
                            System <span style="color: var(--color-admin);">Core</span>
                        </h1>
                        <p style="color: var(--text-muted); font-size: 14px; letter-spacing: 1px;">CENTRAL COMMAND INTERFACE // SECTOR 7</p>
                    </div>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="admin-stats-grid">
                <div class="stat-card">
                    <span class="stat-card__label">Total Users</span>
                    <span class="stat-card__value" id="stat-total-users">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-card__label">Total Creatures</span>
                    <span class="stat-card__value" id="stat-total-creatures">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-card__label">New Users (24h)</span>
                    <span class="stat-card__value" id="stat-new-users">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-card__label">DB Connections</span>
                    <span class="stat-card__value" style="color: #10b981;">Active</span>
                </div>
            </div>

            <!-- Recent Users Section -->
            <section class="admin-section">
                <div class="section-header">
                    <h2 class="section-title">Recent Registered Users</h2>
                    <a href="users.html" class="btn-action">View All Users</a>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Role</th>
                                <th>Level</th>
                                <th>XP</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="recent-users-table">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">
                                    Loading user data...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Recent Activity Section -->
            <section class="admin-section">
                <div class="section-header">
                    <h2 class="section-title">Recent Global Activity</h2>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Action</th>
                                <th>User</th>
                                <th>Target</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="recent-activity-table">
                             <tr>
                                <td colspan="4" style="text-align: center; padding: 40px; color: var(--text-muted);">
                                    Loading activity...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>

        <!-- Footer Placeholder -->
        <div id="comp-admin-footer"></div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/db.js"></script>
    <script src="../js/admin-components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Load Admin Components
            await AdminComponentLoader.loadAll([
                { id: 'comp-admin-sidebar', path: '../components/admin-sidebar.html' },
                { id: 'comp-admin-header', path: '../components/admin-header.html' },
                { id: 'comp-admin-footer', path: '../components/admin-footer.html' }
            ]);

            // Database & Auth Initialization
            if (window.AumageDB) {
                window.AumageDB.init();
                
                const { data: { user }, error: userError } = await window.AumageDB.supabase.auth.getUser();
                if (userError || !user) {
                    window.location.href = '../pages/login.html';
                    return;
                }
                
                const { data: profile } = await window.AumageDB.supabase
                    .from('profiles')
                    .select('role, display_name, avatar_url')
                    .eq('id', user.id)
                    .single();
                
                if (profile?.role !== 'admin') {
                    alert('Access Denied: Admin privileges required.');
                    window.location.href = '../auth/dashboard.html';
                    return;
                }

                // Update Sidebar Profile Info
                const profName = document.getElementById('prof-name');
                const profAvatar = document.getElementById('prof-avatar');
                if (profName) profName.textContent = profile.display_name || 'Admin';
                if (profAvatar && profile.avatar_url) profAvatar.src = profile.avatar_url;
            }

            // Update Header Time
            const timeDisplay = document.getElementById('admin-header-time');
            if (timeDisplay) {
                setInterval(() => {
                    timeDisplay.textContent = new Date().toLocaleTimeString();
                }, 1000);
            }

            // Data Fetching
            fetchStats();
            fetchRecentUsers();
            fetchRecentActivity();
        });

        async function fetchStats() {
            try {
                const { count: userCount } = await AumageDB.supabase
                    .from('profiles')
                    .select('*', { count: 'exact', head: true });
                
                const { count: creatureCount } = await AumageDB.supabase
                    .from('creatures')
                    .select('*', { count: 'exact', head: true });

                document.getElementById('stat-total-users').textContent = userCount || 0;
                document.getElementById('stat-total-creatures').textContent = creatureCount || 0;
            } catch (e) { console.error(e); }
        }

        async function fetchRecentUsers() {
            const tableBody = document.getElementById('recent-users-table');
            try {
                const { data: users, error } = await AumageDB.supabase
                    .from('profiles')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(5);

                if (error) throw error;

                if (users && users.length > 0) {
                    tableBody.innerHTML = users.map(u => `
                        <tr>
                            <td>
                                <div class="user-info">
                                    <img src="${u.avatar_url || 'https://ui-avatars.com/api/?name=' + (u.display_name || 'User')}" class="user-avatar">
                                    <div>
                                        <span class="user-name">${u.display_name || 'Anonymous'}</span>
                                        <span class="user-email">UID: ${u.id.slice(0, 8)}...</span>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge badge--${u.role}">${u.role}</span></td>
                            <td>${u.level}</td>
                            <td>${u.total_xp}</td>
                            <td>${new Date(u.created_at).toLocaleDateString()}</td>
                            <td>
                                <button class="btn-action">Edit</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (e) { console.error(e); }
        }

        async function fetchRecentActivity() {
            const tableBody = document.getElementById('recent-activity-table');
            try {
                const { data: creatures } = await AumageDB.supabase
                    .from('creatures')
                    .select('creature_name, created_at, user_id')
                    .order('created_at', { ascending: false })
                    .limit(5);

                if (creatures && creatures.length > 0) {
                    tableBody.innerHTML = creatures.map(c => `
                        <tr>
                            <td><span style="color: var(--color-primary);">Creature Minted</span></td>
                            <td>User ${c.user_id ? c.user_id.slice(0, 8) : 'Guest'}</td>
                            <td>${c.creature_name || 'Unnamed'}</td>
                            <td>${new Date(c.created_at).toLocaleTimeString()}</td>
                        </tr>
                    `).join('');
                }
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
